<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雾凇会馆 · 妖精公会</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'PingFang SC','Microsoft YaHei',sans-serif; background:#e0dacb; color:#3b392f; min-height:100vh; }
        .login-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(160deg,#2c3828,#4a5b3e); z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column; color:#fff; }
        .login-overlay.hidden { display:none; }
        .login-card { background:#fffef7; border-radius:24px; padding:32px; width:360px; max-width:90%; box-shadow:0 20px 50px rgba(0,0,0,0.4); text-align:center; color:#3b392f; }
        .login-cat { font-size:3.5rem; }
        .login-title { font-size:1.5rem; font-weight:bold; color:#4a5b3e; }
        .login-sub { font-size:0.8rem; color:#888; margin:8px 0 20px; }
        .login-input { width:100%; padding:14px; border:2px solid #cdc6b4; border-radius:14px; font-size:0.95rem; margin-bottom:12px; text-align:center; background:#fefcf5; outline:none; }
        .login-tabs { display:flex; gap:8px; margin-bottom:16px; }
        .login-tab { flex:1; padding:10px; border-radius:20px; cursor:pointer; font-size:0.85rem; background:#f0ede0; border:2px solid transparent; }
        .login-tab.active { background:#556b4b; color:#fff; border-color:#556b4b; }
        .login-btn { width:100%; padding:14px; background:#556b4b; color:#fff; border:none; border-radius:14px; font-weight:bold; cursor:pointer; font-size:1rem; margin-top:8px; }
        .top-bar { background:#2e3824; color:#f1edda; padding:0 16px; display:flex; align-items:center; justify-content:space-between; height:52px; position:sticky; top:0; z-index:100; }
        .user-mini { display:flex; align-items:center; gap:8px; cursor:pointer; font-size:0.85rem; }
        .avatar-thumb { width:34px; height:34px; border-radius:50%; border:2px solid #dbb57c; background:#fff; display:flex; align-items:center; justify-content:center; font-size:1.2rem; }
        .logout-btn { background:rgba(255,255,255,0.2); border:none; color:#f1edda; padding:6px 14px; border-radius:14px; font-size:0.7rem; cursor:pointer; }
        .nav-tabs { display:flex; background:#fffef7; border-bottom:2px solid #cdc6b4; overflow-x:auto; position:sticky; top:52px; z-index:99; scrollbar-width:none; }
        .nav-tabs::-webkit-scrollbar { display:none; }
        .nav-tab { padding:14px 16px; cursor:pointer; white-space:nowrap; font-size:0.85rem; color:#6b6857; border-bottom:3px solid transparent; user-select:none; }
        .nav-tab.active { color:#556b4b; border-bottom-color:#556b4b; font-weight:bold; }
        .main-container { max-width:800px; margin:0 auto; padding:16px 12px 100px; }
        .panel { display:none; animation:fadeIn 0.25s; }
        .panel.active { display:block; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
        .card { background:#fffdf5; border-radius:14px; padding:18px; margin-bottom:14px; box-shadow:0 2px 16px rgba(0,0,0,0.06); border:1px solid #cdc6b4; }
        .card-header { font-weight:bold; font-size:0.95rem; margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid #e4decf; }
        .post-item { padding:14px 0; border-bottom:1px solid #e4decf; cursor:pointer; display:flex; gap:12px; }
        .post-avatar { width:44px; height:44px; border-radius:8px; background:#efe9d8; display:flex; align-items:center; justify-content:center; font-size:1.8rem; flex-shrink:0; }
        .post-title { font-weight:bold; font-size:0.95rem; color:#3b4a2e; }
        .post-meta { font-size:0.75rem; color:#999; }
        .btn { display:inline-block; padding:8px 18px; border-radius:20px; cursor:pointer; border:none; font-size:0.8rem; font-weight:500; text-align:center; }
        .btn-primary { background:#556b4b; color:#fff; }
        .btn-outline { background:#fff; color:#556b4b; border:2px solid #556b4b; }
        .btn-gold { background:linear-gradient(135deg,#b88a4b,#8b5e2c); color:#fff; }
        .btn-sm { padding:6px 14px; font-size:0.75rem; }
        .map-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:12px; }
        .build-card { background:#faf7ed; border-radius:14px; padding:16px; text-align:center; cursor:pointer; border:2px solid transparent; }
        .build-card:hover { border-color:#556b4b; background:#f0f7ed; }
        .build-card .icon { font-size:2.5rem; margin-bottom:8px; }
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:200; display:flex; align-items:center; justify-content:center; }
        .modal { background:#fffef7; border-radius:20px; padding:24px; width:90%; max-width:460px; }
        .modal textarea, .modal input[type="text"] { width:100%; border:2px solid #cdc6b4; border-radius:12px; padding:12px; font-size:0.9rem; margin-bottom:10px; font-family:inherit; }
        .modal textarea { min-height:80px; resize:vertical; }
        .toast-container { position:fixed; top:60px; left:50%; transform:translateX(-50%); z-index:300; }
        .toast { background:#3b392f; color:#fff; padding:12px 24px; border-radius:20px; font-size:0.85rem; animation:slideDown 0.3s, fadeOut 0.3s 1.8s forwards; margin-bottom:6px; }
        .toast.success { background:#4caf50; }
        .toast.error { background:#f44336; }
        @keyframes slideDown { from{opacity:0;transform:translateY(-20px);} to{opacity:1;transform:translateY(0);} }
        @keyframes fadeOut { from{opacity:1;transform:translateY(0);} to{opacity:0;transform:translateY(-15px);} }
    </style>
</head>
<body>
    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <div class="login-cat">🐱</div>
            <div class="login-title">雾凇会馆</div>
            <div class="login-sub">—— 东北吉林 · 妖精公会 ——</div>
            <div class="login-tabs">
                <div class="login-tab active" data-mode="login">登录</div>
                <div class="login-tab" data-mode="register">注册</div>
            </div>
            <input type="text" class="login-input" id="loginUsername" placeholder="妖精名号" maxlength="12" autocomplete="off">
            <input type="password" class="login-input" id="loginPassword" placeholder="密码" autocomplete="off">
            <button class="login-btn" id="loginBtn">进入会馆</button>
            <p style="font-size:0.7rem;color:#aaa;margin-top:12px;">注册后即可登录</p>
        </div>
    </div>
    <div class="top-bar">
        <div class="logo" onclick="switchTab('forum')">🌲 雾凇会馆</div>
        <div class="user-mini">
            <div class="avatar-thumb" id="miniAvatar">🐱</div>
            <span id="miniName">未登录</span>
            <span style="font-size:0.7rem;">Lv.<span id="miniLevel">1</span></span>
            <button class="logout-btn" onclick="handleLogout()">离开</button>
        </div>
    </div>
    <div class="nav-tabs">
        <div class="nav-tab active" data-tab="forum">📜 论坛</div>
        <div class="nav-tab" data-tab="map">🏗️ 基建</div>
    </div>
    <div class="main-container">
        <div class="panel active" id="panel-forum"></div>
        <div class="panel" id="panel-map"></div>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <div class="modal-overlay" id="modalOverlay" style="display:none;"><div class="modal" id="modalContent"></div></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase 配置
        const SUPABASE_URL = 'https://buoecihowzgqjwfhexsw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1b2VjaWhvd3pncWp3ZmhleHN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMDgwMDAsImV4cCI6MjA5Nzg4NDAwMH0.8sEfcTZIJ5mDixNqyqWEe245iFLR9PBh11Wk27SN5nY';
        
        // 创建 Supabase 客户端（用 let 避免重复声明错误）
        let supabase;
        if (typeof window.supabaseClient === 'undefined') {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            window.supabaseClient = supabase;
        } else {
            supabase = window.supabaseClient;
        }

        const ADMIN_NAME = '雾凇馆长';
        const ADMIN_PASS = 'zxcvbnm';
        let currentUser = null;
        let currentUserData = null;

        function showToast(msg, type) {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = 'toast ' + (type || '');
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(function(){ t.remove(); }, 2200);
        }

        function escapeHtml(s) {
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function timeAgo(ts) {
            var diff = Date.now() - ts;
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            return Math.floor(diff / 86400000) + '天前';
        }

        function updateUI() {
            if (!currentUserData) return;
            document.getElementById('miniName').textContent = currentUserData.username;
            document.getElementById('miniLevel').textContent = currentUserData.level || 1;
            document.getElementById('miniAvatar').textContent = currentUserData.avatar || '🐱';
        }

        async function switchTab(tab) {
            document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
            document.getElementById('panel-' + tab).classList.add('active');
            document.querySelectorAll('.nav-tab').forEach(function(t){ t.classList.remove('active'); });
            var el = document.querySelector('.nav-tab[data-tab="' + tab + '"]');
            if (el) el.classList.add('active');
            if (tab === 'forum') await loadForum();
            if (tab === 'map') await loadMap();
        }

        async function loadForum() {
            var panel = document.getElementById('panel-forum');
            panel.innerHTML = '<div class="card"><div style="display:flex;justify-content:space-between;"><span>📢 公告板</span><button class="btn btn-primary btn-sm" onclick="openNewPost()">✏️ 发帖</button></div></div><div class="card" id="postsContainer"><p style="text-align:center;color:#999;">加载中...</p></div>';
            
            try {
                var result = await supabase.from('posts').select('*').order('timestamp', { ascending: false });
                var container = document.getElementById('postsContainer');
                
                if (result.error) {
                    console.error('查询错误:', result.error);
                    container.innerHTML = '<p style="color:#f44336;">加载失败: ' + result.error.message + '</p>';
                    return;
                }
                
                var data = result.data;
                if (!data || data.length === 0) {
                    container.innerHTML = '<p style="color:#999;">暂无帖子，来发第一帖吧！</p>';
                    return;
                }
                
                container.innerHTML = data.map(function(p){
                    var replyCount = (p.replies && p.replies.length) ? p.replies.length : 0;
                    return '<div class="post-item" onclick="viewPost(' + p.id + ')">' +
                        '<div class="post-avatar">' + (p.authorAvatar || '🐱') + '</div>' +
                        '<div style="flex:1;">' +
                        '<div class="post-title">' + escapeHtml(p.title) + (replyCount >= 5 ? ' 🔥' : '') + '</div>' +
                        '<div class="post-meta">' + escapeHtml(p.author) + ' · ' + timeAgo(p.timestamp) + ' · ❤️' + (p.likes || 0) + ' · 💬' + replyCount + '</div>' +
                        '</div></div>';
                }).join('');
            } catch(e) {
                console.error('加载论坛失败:', e);
                document.getElementById('postsContainer').innerHTML = '<p style="color:#f44336;">加载失败，请检查网络连接</p>';
            }
        }

        window.openNewPost = function() {
            var modal = document.getElementById('modalOverlay');
            var content = document.getElementById('modalContent');
            modal.style.display = 'flex';
            content.innerHTML = '<h3>发帖</h3>' +
                '<input type="text" id="npTitle" placeholder="标题" maxlength="50">' +
                '<textarea id="npContent" rows="4" placeholder="内容"></textarea>' +
                '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;">' +
                '<button class="btn btn-outline btn-sm" onclick="document.getElementById(\'modalOverlay\').style.display=\'none\'">取消</button>' +
                '<button class="btn btn-primary btn-sm" id="submitPost">发布</button></div>';
            
            document.getElementById('submitPost').onclick = async function(){
                var title = document.getElementById('npTitle').value.trim();
                var content = document.getElementById('npContent').value.trim();
                if (!title || !content) { showToast('请填写完整', 'error'); return; }
                
                try {
                    var result = await supabase.from('posts').insert({
                        title: title,
                        content: content,
                        author: currentUser,
                        authorAvatar: currentUserData.avatar || '🐱',
                        timestamp: Date.now(),
                        likes: 0,
                        likedBy: [],
                        replies: []
                    });
                    
                    if (result.error) {
                        console.error('发帖错误:', result.error);
                        showToast('发帖失败: ' + result.error.message, 'error');
                        return;
                    }
                    
                    modal.style.display = 'none';
                    showToast('发布成功！', 'success');
                    await loadForum();
                } catch(e) {
                    console.error('发帖异常:', e);
                    showToast('发帖失败，请重试', 'error');
                }
            };
        };

        window.viewPost = async function(postId) {
            try {
                var result = await supabase.from('posts').select('*').eq('id', postId).single();
                if (result.error || !result.data) {
                    showToast('帖子不存在', 'error');
                    return;
                }
                var post = result.data;
                var panel = document.getElementById('panel-forum');
                var replies = post.replies || [];
                
                panel.innerHTML = '<div class="card">' +
                    '<button class="btn btn-outline btn-sm" onclick="switchTab(\'forum\')">← 返回</button>' +
                    '<div style="margin-top:12px;">' +
                    '<strong>' + escapeHtml(post.title) + '</strong>' +
                    '<p style="white-space:pre-wrap;">' + escapeHtml(post.content) + '</p>' +
                    '<button class="btn btn-sm btn-outline" onclick="likePost(' + post.id + ')">❤️ ' + (post.likes || 0) + '</button>' +
                    '<button class="btn btn-sm btn-primary" onclick="openReply(' + post.id + ')">💬 回复</button>' +
                    '</div></div>' +
                    '<div class="card">' +
                    '<div class="card-header">💬 回复 (' + replies.length + ')</div>' +
                    (replies.length > 0 ? replies.map(function(r){
                        return '<div style="padding:8px;border-bottom:1px solid #e4decf;">' +
                            '<strong>' + escapeHtml(r.author) + '</strong>' +
                            '<p>' + escapeHtml(r.content) + '</p></div>';
                    }).join('') : '<p style="color:#999;">暂无回复</p>') +
                    '<button class="btn btn-primary btn-sm" style="margin-top:8px;width:100%;" onclick="openReply(' + post.id + ')">回复此帖</button>' +
                    '</div>';
            } catch(e) {
                console.error('查看帖子失败:', e);
                showToast('加载失败', 'error');
            }
        };

        window.likePost = async function(postId) {
            try {
                var result = await supabase.from('posts').select('*').eq('id', postId).single();
                if (result.error) return;
                var post = result.data;
                var likedBy = post.likedBy || [];
                if (likedBy.indexOf(currentUser) !== -1) { showToast('已点赞'); return; }
                
                var newLikes = (post.likes || 0) + 1;
                var newLikedBy = likedBy.concat([currentUser]);
                await supabase.from('posts').update({ likes: newLikes, likedBy: newLikedBy }).eq('id', postId);
                showToast('❤️ 已点赞');
            } catch(e) {
                console.error('点赞失败:', e);
            }
        };

        window.openReply = function(postId) {
            var modal = document.getElementById('modalOverlay');
            modal.style.display = 'flex';
            document.getElementById('modalContent').innerHTML = '<h3>回复</h3>' +
                '<textarea id="replyContent" rows="4"></textarea>' +
                '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;">' +
                '<button class="btn btn-outline btn-sm" onclick="document.getElementById(\'modalOverlay\').style.display=\'none\'">取消</button>' +
                '<button class="btn btn-primary btn-sm" id="submitReply">发表</button></div>';
            
            document.getElementById('submitReply').onclick = async function(){
                var content = document.getElementById('replyContent').value.trim();
                if (!content) return;
                
                try {
                    var result = await supabase.from('posts').select('*').eq('id', postId).single();
                    if (result.error) return;
                    var post = result.data;
                    var newReplies = (post.replies || []).concat([{
                        author: currentUser,
                        content: content,
                        timestamp: Date.now()
                    }]);
                    
                    await supabase.from('posts').update({ replies: newReplies }).eq('id', postId);
                    modal.style.display = 'none';
                    showToast('回复成功');
                    await viewPost(postId);
                } catch(e) {
                    console.error('回复失败:', e);
                    showToast('回复失败', 'error');
                }
            };
        };

        async function loadMap() {
            var b = (currentUserData && currentUserData.buildings) ? currentUserData.buildings : { farm: 0, house: 0, land: 0 };
            document.getElementById('panel-map').innerHTML = '<div class="card">' +
                '<div class="card-header">🏗️ 基建中心</div>' +
                '<p>金币：🪙 ' + (currentUserData ? currentUserData.gold || 0 : 0) + '</p>' +
                '<div class="map-grid">' +
                '<div class="build-card" onclick="build(\'farm\')"><div class="icon">🌾</div><div>农场</div><div>' + (b.farm || 0) + '块</div><div>💰50金币</div></div>' +
                '<div class="build-card" onclick="build(\'house\')"><div class="icon">🏡</div><div>小屋</div><div>' + (b.house || 0) + '间</div><div>💰200金币</div></div>' +
                '<div class="build-card" onclick="build(\'land\')"><div class="icon">🏔️</div><div>领地</div><div>' + (b.land || 0) + '处</div><div>💰500金币</div></div>' +
                '</div></div>';
        }

        window.build = async function(type) {
            if (!currentUserData) return;
            var costs = { farm: 50, house: 200, land: 500 };
            if ((currentUserData.gold || 0) < costs[type]) { showToast('金币不足', 'error'); return; }
            
            try {
                var b = Object.assign({}, currentUserData.buildings || { farm: 0, house: 0, land: 0 });
                b[type] = (b[type] || 0) + 1;
                var newGold = (currentUserData.gold || 0) - costs[type];
                
                var result = await supabase.from('users').update({ gold: newGold, buildings: b }).eq('username', currentUser);
                if (result.error) {
                    console.error('建设失败:', result.error);
                    showToast('建设失败: ' + result.error.message, 'error');
                    return;
                }
                
                currentUserData.gold = newGold;
                currentUserData.buildings = b;
                showToast('建设成功！', 'success');
                await loadMap();
            } catch(e) {
                console.error('建设异常:', e);
                showToast('建设失败，请重试', 'error');
            }
        };

        document.getElementById('loginBtn').addEventListener('click', async function(){
            var username = document.getElementById('loginUsername').value.trim();
            var password = document.getElementById('loginPassword').value;
            var mode = document.querySelector('.login-tab.active').dataset.mode;
            
            if (!username || !password) { showToast('请填写完整', 'error'); return; }
            
            // 馆长登录
            if (username === ADMIN_NAME && password === ADMIN_PASS) {
                currentUser = username;
                currentUserData = { username: username, level: 99, gold: 9999, avatar: '🐱', buildings: { farm: 0, house: 0, land: 0 } };
                document.getElementById('loginOverlay').classList.add('hidden');
                updateUI();
                await switchTab('forum');
                showToast('🌲 馆长大人，欢迎回来！');
                return;
            }
            
            // 注册
            if (mode === 'register') {
                try {
                    var checkResult = await supabase.from('users').select('username').eq('username', username);
                    if (checkResult.data && checkResult.data.length > 0) {
                        showToast('该名号已存在', 'error');
                        return;
                    }
                    
                    var insertResult = await supabase.from('users').insert({
                        username: username,
                        password: password,
                        level: 1,
                        exp: 0,
                        gold: 200,
                        avatar: '',
                        totalPosts: 0,
                        totalReplies: 0,
                        friends: [],
                        buildings: { farm: 0, house: 0, land: 0 }
                    });
                    
                    if (insertResult.error) {
                        console.error('注册错误:', insertResult.error);
                        showToast('注册失败: ' + insertResult.error.message, 'error');
                        return;
                    }
                    
                    showToast('注册成功！请登录', 'success');
                    document.querySelector('.login-tab[data-mode="login"]').click();
                } catch(e) {
                    console.error('注册异常:', e);
                    showToast('注册失败，请重试', 'error');
                }
                return;
            }
            
            // 登录
            try {
                var loginResult = await supabase.from('users').select('*').eq('username', username).single();
                if (loginResult.error || !loginResult.data) {
                    showToast('用户不存在', 'error');
                    return;
                }
                var user = loginResult.data;
                if (user.password !== password) {
                    showToast('密码错误', 'error');
                    return;
                }
                currentUser = username;
                currentUserData = user;
                document.getElementById('loginOverlay').classList.add('hidden');
                updateUI();
                await switchTab('forum');
                showToast('🌲 欢迎 ' + username);
            } catch(e) {
                console.error('登录异常:', e);
                showToast('登录失败，请重试', 'error');
            }
        });

        function handleLogout() {
            location.reload();
        }

        document.querySelectorAll('.login-tab').forEach(function(t){
            t.addEventListener('click', function(){
                document.querySelectorAll('.login-tab').forEach(function(x){ x.classList.remove('active'); });
                this.classList.add('active');
            });
        });

        document.querySelectorAll('.nav-tab').forEach(function(t){
            t.addEventListener('click', function(){
                switchTab(this.dataset.tab);
            });
        });

        document.getElementById('modalOverlay').addEventListener('click', function(e){
            if (e.target === this) this.style.display = 'none';
        });

        document.getElementById('loginPassword').addEventListener('keypress', function(e){
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });

        window.switchTab = switchTab;
        window.handleLogout = handleLogout;
    </script>
</body>
</html>
