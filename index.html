<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雾凇会馆 · 妖精公会</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'PingFang SC','Microsoft YaHei',sans-serif; background:#e0dacb; color:#3b392f; min-height:100vh; }
        .login-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(160deg,#2c3828,#4a5b3e); z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column; color:#fff; }
        .login-overlay.hidden { display:none; }
        .login-card { background:#fffef7; border-radius:24px; padding:32px; width:360px; max-width:90%; box-shadow:0 20px 50px rgba(0,0,0,0.4); text-align:center; color:#3b392f; }
        .login-cat { font-size:3.5rem; }
        .login-title { font-size:1.5rem; font-weight:bold; color:#4a5b3e; }
        .login-sub { font-size:0.8rem; color:#888; margin:8px 0 20px; }
        .login-input { width:100%; padding:14px; border:2px solid #cdc6b4; border-radius:14px; font-size:0.95rem; margin-bottom:12px; text-align:center; background:#fefcf5; outline:none; }
        .login-input:focus { border-color:#4a5b3e; }
        .login-tabs { display:flex; gap:8px; margin-bottom:16px; }
        .login-tab { flex:1; padding:10px; border-radius:20px; cursor:pointer; font-size:0.85rem; background:#f0ede0; border:2px solid transparent; }
        .login-tab.active { background:#556b4b; color:#fff; border-color:#556b4b; }
        .login-btn { width:100%; padding:14px; background:#556b4b; color:#fff; border:none; border-radius:14px; font-weight:bold; cursor:pointer; font-size:1rem; margin-top:8px; }
        .login-btn:hover { background:#3b4f34; }
        .top-bar { background:#2e3824; color:#f1edda; padding:0 16px; display:flex; align-items:center; justify-content:space-between; height:52px; position:sticky; top:0; z-index:100; }
        .user-mini { display:flex; align-items:center; gap:8px; cursor:pointer; font-size:0.85rem; }
        .avatar-thumb { width:34px; height:34px; border-radius:50%; border:2px solid #dbb57c; object-fit:cover; background:#fff; display:flex; align-items:center; justify-content:center; font-size:1.2rem; }
        .logout-btn { background:rgba(255,255,255,0.2); border:none; color:#f1edda; padding:6px 14px; border-radius:14px; font-size:0.7rem; cursor:pointer; }
        .nav-tabs { display:flex; background:#fffef7; border-bottom:2px solid #cdc6b4; overflow-x:auto; position:sticky; top:52px; z-index:99; scrollbar-width:none; }
        .nav-tabs::-webkit-scrollbar { display:none; }
        .nav-tab { padding:14px 16px; cursor:pointer; white-space:nowrap; font-size:0.85rem; color:#6b6857; border-bottom:3px solid transparent; user-select:none; }
        .nav-tab.active { color:#556b4b; border-bottom-color:#556b4b; font-weight:bold; }
        .main-container { max-width:800px; margin:0 auto; padding:16px 12px 100px; }
        .panel { display:none; animation:fadeIn 0.25s; }
        .panel.active { display:block; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
        .card { background:#fffdf5; border-radius:14px; padding:18px; margin-bottom:14px; box-shadow:0 2px 16px rgba(0,0,0,0.06); border:1px solid #cdc6b4; }
        .card-header { font-weight:bold; font-size:0.95rem; margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid #e4decf; }
        .post-item { padding:14px 0; border-bottom:1px solid #e4decf; cursor:pointer; display:flex; gap:12px; align-items:flex-start; }
        .post-item:hover { background:#faf8f0; }
        .post-avatar { width:44px; height:44px; border-radius:8px; background:#efe9d8; display:flex; align-items:center; justify-content:center; font-size:1.8rem; flex-shrink:0; }
        .post-title { font-weight:bold; font-size:0.95rem; color:#3b4a2e; }
        .post-meta { font-size:0.75rem; color:#999; margin-top:2px; }
        .btn { display:inline-block; padding:8px 18px; border-radius:20px; cursor:pointer; border:none; font-size:0.8rem; font-weight:500; transition:0.2s; text-align:center; }
        .btn-primary { background:#556b4b; color:#fff; }
        .btn-outline { background:#fff; color:#556b4b; border:2px solid #556b4b; }
        .btn-gold { background:linear-gradient(135deg,#b88a4b,#8b5e2c); color:#fff; }
        .btn-sm { padding:6px 14px; font-size:0.75rem; }
        .btn-block { display:block; width:100%; margin-top:6px; }
        .task-item { display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid #e4decf; }
        .progress-bar { height:8px; background:#dad4c1; border-radius:4px; overflow:hidden; margin-top:4px; }
        .progress-fill { height:100%; background:#6b9b6b; border-radius:4px; transition:width 0.4s; }
        .map-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:12px; }
        .build-card { background:#faf7ed; border-radius:14px; padding:16px; text-align:center; cursor:pointer; border:2px solid transparent; transition:0.2s; }
        .build-card:hover { border-color:#556b4b; background:#f0f7ed; }
        .build-card .icon { font-size:2.5rem; margin-bottom:8px; }
        .friend-item { display:flex; align-items:center; justify-content:space-between; padding:10px; border-bottom:1px solid #e4decf; }
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:200; display:flex; align-items:center; justify-content:center; }
        .modal { background:#fffef7; border-radius:20px; padding:24px; width:90%; max-width:460px; max-height:80vh; overflow-y:auto; }
        .modal textarea, .modal input[type="text"] { width:100%; border:2px solid #cdc6b4; border-radius:12px; padding:12px; font-size:0.9rem; margin-bottom:10px; resize:vertical; min-height:80px; font-family:inherit; }
        .modal input[type="text"] { min-height:auto; }
        .admin-table { width:100%; border-collapse:collapse; font-size:0.8rem; }
        .admin-table th { background:#f0ede0; padding:10px; text-align:left; }
        .admin-table td { padding:10px; border-bottom:1px solid #e4decf; }
        .toast-container { position:fixed; top:60px; left:50%; transform:translateX(-50%); z-index:300; }
        .toast { background:#3b392f; color:#fff; padding:12px 24px; border-radius:20px; font-size:0.85rem; animation:slideDown 0.3s, fadeOut 0.3s 1.8s forwards; margin-bottom:6px; }
        .toast.success { background:#4caf50; }
        .toast.error { background:#f44336; }
        @keyframes slideDown { from{opacity:0;transform:translateY(-20px);} to{opacity:1;transform:translateY(0);} }
        @keyframes fadeOut { from{opacity:1;transform:translateY(0);} to{opacity:0;transform:translateY(-15px);} }
    </style>
</head>
<body>
    <!-- 登录界面 -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <div class="login-cat">🐱</div>
            <div class="login-title">雾凇会馆</div>
            <div class="login-sub">—— 东北吉林 · 妖精公会 ——</div>
            <div class="login-tabs">
                <div class="login-tab active" data-mode="login">登录</div>
                <div class="login-tab" data-mode="register">注册</div>
            </div>
            <input type="text" class="login-input" id="loginUsername" placeholder="妖精名号" maxlength="12" autocomplete="off">
            <input type="password" class="login-input" id="loginPassword" placeholder="密码" autocomplete="off">
            <button class="login-btn" id="loginBtn">进入会馆</button>
            <p style="font-size:0.7rem;color:#aaa;margin-top:12px;">新妖精首次登录将自动注册</p>
        </div>
    </div>
    <!-- 顶部导航 -->
    <div class="top-bar">
        <div class="logo" onclick="switchTab('forum')">🌲 雾凇会馆</div>
        <div class="user-mini">
            <div class="avatar-thumb" id="miniAvatar">🐱</div>
            <span id="miniName">未登录</span>
            <span style="font-size:0.7rem;">Lv.<span id="miniLevel">1</span></span>
            <span id="adminBadge" style="display:none;background:#c47a4f;color:#fff;font-size:0.65rem;padding:2px 8px;border-radius:10px;">馆长</span>
            <button class="logout-btn" onclick="handleLogout()">离开</button>
        </div>
    </div>
    <!-- 标签导航 -->
    <div class="nav-tabs" id="navTabs">
        <div class="nav-tab active" data-tab="forum">📜 论坛</div>
        <div class="nav-tab" data-tab="tasks">📋 任务</div>
        <div class="nav-tab" data-tab="map">🏗️ 基建</div>
        <div class="nav-tab" data-tab="friends">👥 好友</div>
        <div class="nav-tab" data-tab="admin" id="adminTab" style="display:none;">🔐 管理</div>
    </div>
    <!-- 主内容 -->
    <div class="main-container">
        <div class="panel active" id="panel-forum"></div>
        <div class="panel" id="panel-tasks"></div>
        <div class="panel" id="panel-map"></div>
        <div class="panel" id="panel-friends"></div>
        <div class="panel" id="panel-admin"></div>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <div class="modal-overlay" id="modalOverlay" style="display:none;"><div class="modal" id="modalContent"></div></div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ==========================================
        // ⚠️ 这里填你在 Supabase 获取的配置
        // ==========================================
        const SUPABASE_URL = 'https://buoecihowzgqjwfhexsw.supabase.co';
        const SUPABASE_ANON_KEY = eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1b2VjaWhvd3pncWp3ZmhleHN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMDgwMDAsImV4cCI6MjA5Nzg4NDAwMH0.8sEfcTZIJ5mDixNqyqWEe245iFLR9PBh11Wk27SN5nY
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const ADMIN_NAME = '雾凇馆长';
        const ADMIN_PASS = 'zxcvbnm';
        
        let currentUser = null;
        let currentUserData = null;
        let isAdmin = false;

        function showToast(msg, type='') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = 'toast '+type; t.textContent = msg;
            c.appendChild(t);
            setTimeout(()=>t.remove(), 2200);
        }
        function escapeHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
        function timeAgo(ts) { const diff=Date.now()-ts; if(diff<6e4) return '刚刚'; if(diff<36e5) return Math.floor(diff/6e4)+'分钟前'; if(diff<864e5) return Math.floor(diff/36e5)+'小时前'; return Math.floor(diff/864e5)+'天前'; }

        function updateUI() {
            if(!currentUserData) return;
            document.getElementById('miniName').textContent = currentUserData.username;
            document.getElementById('miniLevel').textContent = currentUserData.level || 1;
            document.getElementById('miniAvatar').textContent = currentUserData.avatar || '🐱';
            if(isAdmin) {
                document.getElementById('adminTab').style.display = 'inline-block';
                document.getElementById('adminBadge').style.display = 'inline';
            }
        }

        async function switchTab(tab) {
            document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
            document.getElementById('panel-'+tab).classList.add('active');
            document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
            const el = document.querySelector(`.nav-tab[data-tab="${tab}"]`);
            if(el) el.classList.add('active');
            if(tab==='forum') await loadForum();
            if(tab==='tasks') await loadTasks();
            if(tab==='map') await loadMap();
            if(tab==='friends') await loadFriends();
            if(tab==='admin') await loadAdmin();
        }

        async function loadForum() {
            const panel = document.getElementById('panel-forum');
            panel.innerHTML = `<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;"><span>📢 公告板</span><button class="btn btn-primary btn-sm" onclick="openNewPost()">✏️ 发帖</button></div></div><div class="card" id="postsContainer"><p style="text-align:center;color:#999;">加载中...</p></div>`;
            const { data, error } = await supabase.from('posts').select('*').order('timestamp', { ascending: false });
            const container = document.getElementById('postsContainer');
            if(error) { container.innerHTML = '<p style="color:#f44336;">加载失败</p>'; return; }
            if(data.length===0) { container.innerHTML = '<p style="color:#999;">暂无帖子</p>'; return; }
            container.innerHTML = data.map(p=>`
                <div class="post-item" onclick="viewPost(${p.id})">
                    <div class="post-avatar">${p.authorAvatar||'🐱'}</div>
                    <div style="flex:1;"><div class="post-title">${escapeHtml(p.title)} ${(p.replies?.length||0)>=5?'🔥':''}</div>
                    <div class="post-meta">${escapeHtml(p.author)} · ${timeAgo(p.timestamp)} · ❤️${p.likes||0} · 💬${p.replies?.length||0}</div></div>
                </div>`).join('');
        }

        window.openNewPost = function() {
            const modal = document.getElementById('modalOverlay');
            const content = document.getElementById('modalContent');
            modal.style.display = 'flex';
            content.innerHTML = `<h3>发帖</h3><input type="text" id="npTitle" placeholder="标题" maxlength="50"><textarea id="npContent" rows="4" placeholder="内容"></textarea><div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;"><button class="btn btn-outline btn-sm" onclick="document.getElementById('modalOverlay').style.display='none'">取消</button><button class="btn btn-primary btn-sm" id="submitPost">发布</button></div>`;
            document.getElementById('submitPost').onclick = async ()=>{
                const title = document.getElementById('npTitle').value.trim();
                const content = document.getElementById('npContent').value.trim();
                if(!title||!content) { showToast('请填写完整','error'); return; }
                await supabase.from('posts').insert({title,content,author:currentUser,authorAvatar:currentUserData.avatar||'🐱',timestamp:Date.now(),likes:0,likedBy:[],replies:[]});
                modal.style.display = 'none'; showToast('发布成功','success'); await loadForum();
            };
        };

        window.viewPost = async function(postId) {
            const { data: post } = await supabase.from('posts').select('*').eq('id', postId).single();
            if(!post) return;
            const panel = document.getElementById('panel-forum');
            const isLiked = post.likedBy?.includes(currentUser);
            panel.innerHTML = `<div class="card"><button class="btn btn-outline btn-sm" onclick="switchTab('forum')">← 返回</button>
            <div style="margin-top:12px;"><strong>${escapeHtml(post.title)}</strong><p>${escapeHtml(post.content)}</p>
            <button class="btn btn-sm btn-outline" onclick="likePost(${post.id})">❤️ ${post.likes||0}</button>
            <button class="btn btn-sm btn-primary" onclick="openReply(${post.id})">💬 回复</button></div></div>
            <div class="card"><div class="card-header">回复 (${post.replies?.length||0})</div>
            ${(post.replies||[]).map(r=>`<div style="padding:8px;border-bottom:1px solid #eee;"><strong>${escapeHtml(r.author)}</strong><p>${escapeHtml(r.content)}</p></div>`).join('')}
            <button class="btn btn-primary btn-sm btn-block" onclick="openReply(${post.id})">回复</button></div>`;
        };

        window.likePost = async function(postId) {
            const { data: post } = await supabase.from('posts').select('*').eq('id', postId).single();
            if(post.likedBy?.includes(currentUser)) { showToast('已点赞'); return; }
            const newLikes = (post.likes||0)+1;
            const newLikedBy = [...(post.likedBy||[]), currentUser];
            await supabase.from('posts').update({likes:newLikes, likedBy:newLikedBy}).eq('id', postId);
            showToast('❤️ 已点赞');
        };

        window.openReply = function(postId) {
            const modal = document.getElementById('modalOverlay');
            modal.style.display = 'flex';
            document.getElementById('modalContent').innerHTML = `<h3>回复</h3><textarea id="replyContent" rows="4"></textarea><div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;"><button class="btn btn-outline btn-sm" onclick="document.getElementById('modalOverlay').style.display='none'">取消</button><button class="btn btn-primary btn-sm" id="submitReply">发表</button></div>`;
            document.getElementById('submitReply').onclick = async ()=>{
                const content = document.getElementById('replyContent').value.trim();
                if(!content) return;
                const { data: post } = await supabase.from('posts').select('*').eq('id', postId).single();
                const newReplies = [...(post.replies||[]), {author:currentUser, content, timestamp:Date.now()}];
                await supabase.from('posts').update({replies:newReplies}).eq('id', postId);
                modal.style.display = 'none'; showToast('回复成功');
            };
        };

        async function loadTasks() {
            document.getElementById('panel-tasks').innerHTML = `<div class="card"><div class="card-header">📋 任务</div><p>任务功能开发中...</p></div>`;
        }
        async function loadMap() {
            const b = currentUserData?.buildings || {farm:0,house:0,land:0};
            document.getElementById('panel-map').innerHTML = `<div class="card"><div class="card-header">🏗️ 基建中心</div><p>金币：🪙 ${currentUserData?.gold||0}</p>
            <div class="map-grid">
                <div class="build-card" onclick="build('farm')"><div class="icon">🌾</div><div>农场</div><div>${b.farm}块</div><div>💰50金币</div></div>
                <div class="build-card" onclick="build('house')"><div class="icon">🏡</div><div>小屋</div><div>${b.house}间</div><div>💰200金币</div></div>
                <div class="build-card" onclick="build('land')"><div class="icon">🏔️</div><div>领地</div><div>${b.land}处</div><div>💰500金币</div></div>
            </div></div>`;
        }
        window.build = async function(type) {
            const costs = {farm:50,house:200,land:500};
            if((currentUserData.gold||0) < costs[type]) { showToast('金币不足','error'); return; }
            const b = {...currentUserData.buildings};
            b[type] = (b[type]||0)+1;
            const newGold = currentUserData.gold - costs[type];
            await supabase.from('users').update({gold:newGold, buildings:b}).eq('username', currentUser);
            showToast('建设成功','success');
            currentUserData.gold = newGold; currentUserData.buildings = b;
            await loadMap();
        };
        async function loadFriends() {
            document.getElementById('panel-friends').innerHTML = `<div class="card"><div class="card-header">👥 好友</div><p>好友功能开发中...</p></div>`;
        }
        async function loadAdmin() {
            if(!isAdmin) return;
            const { data } = await supabase.from('users').select('*');
            document.getElementById('panel-admin').innerHTML = `<div class="card"><div class="card-header">🔐 管理后台</div><table class="admin-table"><tr><th>名号</th><th>等级</th><th>金币</th></tr>${(data||[]).map(u=>`<tr><td>${escapeHtml(u.username)}</td><td>${u.level||1}</td><td>${u.gold||0}</td></tr>`).join('')}</table></div>`;
        }

        document.getElementById('loginBtn').addEventListener('click', async ()=>{
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const mode = document.querySelector('.login-tab.active').dataset.mode;
            if(!username||!password) { showToast('请填写完整','error'); return; }
            if(username===ADMIN_NAME) {
                if(password!==ADMIN_PASS) { showToast('馆长密码错误','error'); return; }
                isAdmin = true;
            } else isAdmin = false;
            if(mode==='register') {
                const { data: exist } = await supabase.from('users').select('username').eq('username', username);
                if(exist?.length) { showToast('该名号已存在','error'); return; }
                await supabase.from('users').insert({username, password, level:1, exp:0, gold:200, avatar:'', totalPosts:0, totalReplies:0, friends:[], buildings:{farm:0,house:0,land:0}});
                showToast('注册成功，请登录','success');
                document.querySelector('.login-tab[data-mode="login"]').click();
                return;
            }
            const { data: user } = await supabase.from('users').select('*').eq('username', username).single();
            if(!user) { showToast('用户不存在','error'); return; }
            if(user.password !== password) { showToast('密码错误','error'); return; }
            currentUser = username; currentUserData = user;
            document.getElementById('loginOverlay').classList.add('hidden');
            updateUI(); await switchTab('forum');
            showToast(`🌲 欢迎 ${username}`);
        });
        function handleLogout() { location.reload(); }
        document.querySelectorAll('.login-tab').forEach(t=>t.addEventListener('click', function(){ document.querySelectorAll('.login-tab').forEach(x=>x.classList.remove('active')); this.classList.add('active'); }));
        document.querySelectorAll('.nav-tab').forEach(t=>t.addEventListener('click', function(){ switchTab(this.dataset.tab); }));
        document.getElementById('modalOverlay').addEventListener('click', function(e){ if(e.target===this) this.style.display='none'; });
        document.getElementById('loginPassword').addEventListener('keypress', e=>{ if(e.key==='Enter') document.getElementById('loginBtn').click(); });
        window.switchTab = switchTab;
        window.handleLogout = handleLogout;
    </script>
</body>
</html>
