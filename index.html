<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雾凇会馆 · 妖精公会</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'PingFang SC','Microsoft YaHei',sans-serif; background:#e0dacb; color:#3b392f; min-height:100vh; }
        .login-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(160deg,#2c3828,#4a5b3e); z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column; color:#fff; }
        .login-overlay.hidden { display:none; }
        .login-card { background:#fffef7; border-radius:24px; padding:32px; width:360px; max-width:90%; box-shadow:0 20px 50px rgba(0,0,0,0.4); text-align:center; color:#3b392f; }
        .login-cat { font-size:3.5rem; }
        .login-title { font-size:1.5rem; font-weight:bold; color:#4a5b3e; }
        .login-sub { font-size:0.8rem; color:#888; margin:8px 0 20px; }
        .login-input { width:100%; padding:14px; border:2px solid #cdc6b4; border-radius:14px; font-size:0.95rem; margin-bottom:12px; text-align:center; background:#fefcf5; outline:none; }
        .login-tabs { display:flex; gap:8px; margin-bottom:16px; }
        .login-tab { flex:1; padding:10px; border-radius:20px; cursor:pointer; font-size:0.85rem; background:#f0ede0; border:2px solid transparent; }
        .login-tab.active { background:#556b4b; color:#fff; border-color:#556b4b; }
        .login-btn { width:100%; padding:14px; background:#556b4b; color:#fff; border:none; border-radius:14px; font-weight:bold; cursor:pointer; font-size:1rem; margin-top:8px; }
        .top-bar { background:#2e3824; color:#f1edda; padding:0 16px; display:flex; align-items:center; justify-content:space-between; height:52px; position:sticky; top:0; z-index:100; }
        .user-mini { display:flex; align-items:center; gap:8px; font-size:0.85rem; }
        .avatar-thumb { width:34px; height:34px; border-radius:50%; border:2px solid #dbb57c; background:#fff; display:flex; align-items:center; justify-content:center; font-size:1.2rem; }
        .logout-btn { background:rgba(255,255,255,0.2); border:none; color:#f1edda; padding:6px 14px; border-radius:14px; font-size:0.7rem; cursor:pointer; }
        .nav-tabs { display:flex; background:#fffef7; border-bottom:2px solid #cdc6b4; overflow-x:auto; position:sticky; top:52px; z-index:99; }
        .nav-tab { padding:14px 16px; cursor:pointer; white-space:nowrap; font-size:0.85rem; color:#6b6857; border-bottom:3px solid transparent; user-select:none; }
        .nav-tab.active { color:#556b4b; border-bottom-color:#556b4b; font-weight:bold; }
        .main-container { max-width:800px; margin:0 auto; padding:16px 12px 100px; }
        .panel { display:none; }
        .panel.active { display:block; }
        .card { background:#fffdf5; border-radius:14px; padding:18px; margin-bottom:14px; box-shadow:0 2px 16px rgba(0,0,0,0.06); border:1px solid #cdc6b4; }
        .card-header { font-weight:bold; font-size:0.95rem; margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid #e4decf; }
        .post-item { padding:14px 0; border-bottom:1px solid #e4decf; cursor:pointer; display:flex; gap:12px; }
        .post-item:hover { background:#faf8f0; }
        .post-avatar { width:44px; height:44px; border-radius:8px; background:#efe9d8; display:flex; align-items:center; justify-content:center; font-size:1.8rem; flex-shrink:0; }
        .post-title { font-weight:bold; font-size:0.95rem; color:#3b4a2e; }
        .post-meta { font-size:0.75rem; color:#999; }
        .btn { display:inline-block; padding:8px 18px; border-radius:20px; cursor:pointer; border:none; font-size:0.8rem; font-weight:500; text-align:center; }
        .btn-primary { background:#556b4b; color:#fff; }
        .btn-outline { background:#fff; color:#556b4b; border:2px solid #556b4b; }
        .btn-sm { padding:6px 14px; font-size:0.75rem; }
        .map-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:12px; }
        .build-card { background:#faf7ed; border-radius:14px; padding:16px; text-align:center; cursor:pointer; border:2px solid transparent; }
        .build-card:hover { border-color:#556b4b; }
        .build-card .icon { font-size:2.5rem; margin-bottom:8px; }
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:200; display:flex; align-items:center; justify-content:center; }
        .modal { background:#fffef7; border-radius:20px; padding:24px; width:90%; max-width:460px; }
        .modal textarea,.modal input[type="text"] { width:100%; border:2px solid #cdc6b4; border-radius:12px; padding:12px; font-size:0.9rem; margin-bottom:10px; font-family:inherit; }
        .modal textarea { min-height:80px; resize:vertical; }
        .toast-container { position:fixed; top:60px; left:50%; transform:translateX(-50%); z-index:300; }
        .toast { background:#3b392f; color:#fff; padding:12px 24px; border-radius:20px; font-size:0.85rem; margin-bottom:6px; }
        .toast.success { background:#4caf50; }
        .toast.error { background:#f44336; }
    </style>
</head>
<body>
    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <div class="login-cat">🐱</div>
            <div class="login-title">雾凇会馆</div>
            <div class="login-sub">—— 东北吉林 · 妖精公会 ——</div>
            <div class="login-tabs">
                <div class="login-tab active" data-mode="login">登录</div>
                <div class="login-tab" data-mode="register">注册</div>
            </div>
            <input type="text" class="login-input" id="loginUsername" placeholder="妖精名号" maxlength="12">
            <input type="password" class="login-input" id="loginPassword" placeholder="密码">
            <button class="login-btn" id="loginBtn">进入会馆</button>
            <p style="font-size:0.7rem;color:#aaa;margin-top:12px;">注册后即可登录</p>
        </div>
    </div>
    <div class="top-bar">
        <div class="logo" onclick="switchTab('forum')">🌲 雾凇会馆</div>
        <div class="user-mini">
            <div class="avatar-thumb" id="miniAvatar">🐱</div>
            <span id="miniName">未登录</span>
            <span style="font-size:0.7rem;">Lv.<span id="miniLevel">1</span></span>
            <button class="logout-btn" onclick="handleLogout()">离开</button>
        </div>
    </div>
    <div class="nav-tabs">
        <div class="nav-tab active" data-tab="forum">📜 论坛</div>
        <div class="nav-tab" data-tab="map">🏗️ 基建</div>
    </div>
    <div class="main-container">
        <div class="panel active" id="panel-forum"></div>
        <div class="panel" id="panel-map"></div>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <div class="modal-overlay" id="modalOverlay" style="display:none;"><div class="modal" id="modalContent"></div></div>

    <!-- CDN 引入（会自动创建全局变量 supabase） -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ⚠️ 不再用 const supabase = ...，直接用 CDN 提供的全局 supabase
        var client = supabase.createClient(
            'https://buoecihowzgqjwfhexsw.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1b2VjaWhvd3pncWp3ZmhleHN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMDgwMDAsImV4cCI6MjA5Nzg4NDAwMH0.8sEfcTZIJ5mDixNqyqWEe245iFLR9PBh11Wk27SN5nY'
        );

        var ADMIN_NAME = '雾凇馆长';
        var ADMIN_PASS = 'zxcvbnm';
        var currentUser = null;
        var currentUserData = null;

        function showToast(msg, type) {
            var c = document.getElementById('toastContainer');
            var t = document.createElement('div');
            t.className = 'toast ' + (type || '');
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(function(){ t.remove(); }, 2200);
        }

        function escHtml(s) {
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function timeAgo(ts) {
            var diff = Date.now() - ts;
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            return Math.floor(diff / 86400000) + '天前';
        }

        function updateUI() {
            if (!currentUserData) return;
            document.getElementById('miniName').textContent = currentUserData.username;
            document.getElementById('miniLevel').textContent = currentUserData.level || 1;
            document.getElementById('miniAvatar').textContent = currentUserData.avatar || '🐱';
        }

        async function switchTab(tab) {
            document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
            document.getElementById('panel-' + tab).classList.add('active');
            document.querySelectorAll('.nav-tab').forEach(function(t){ t.classList.remove('active'); });
            var el = document.querySelector('.nav-tab[data-tab="' + tab + '"]');
            if (el) el.classList.add('active');
            if (tab === 'forum') await loadForum();
            if (tab === 'map') await loadMap();
        }

        async function loadForum() {
            var panel = document.getElementById('panel-forum');
            panel.innerHTML = '<div class="card"><div style="display:flex;justify-content:space-between;"><span>📢 公告板</span><button class="btn btn-primary btn-sm" onclick="openNewPost()">✏️ 发帖</button></div></div><div class="card" id="postsContainer"><p style="text-align:center;color:#999;">加载中...</p></div>';
            try {
                var result = await client.from('posts').select('*').order('timestamp', { ascending: false });
                var container = document.getElementById('postsContainer');
                if (result.error) { container.innerHTML = '<p style="color:#f44336;">加载失败: ' + result.error.message + '</p>'; return; }
                var data = result.data;
                if (!data || data.length === 0) { container.innerHTML = '<p style="color:#999;">暂无帖子</p>'; return; }
                container.innerHTML = data.map(function(p){
                    var rc = p.replies ? p.replies.length : 0;
                    return '<div class="post-item" onclick="viewPost(' + p.id + ')"><div class="post-avatar">' + (p.authorAvatar || '🐱') + '</div><div style="flex:1;"><div class="post-title">' + escHtml(p.title) + (rc >= 5 ? ' 🔥' : '') + '</div><div class="post-meta">' + escHtml(p.author) + ' · ' + timeAgo(p.timestamp) + ' · ❤️' + (p.likes || 0) + ' · 💬' + rc + '</div></div></div>';
                }).join('');
            } catch(e) {
                document.getElementById('postsContainer').innerHTML = '<p style="color:#f44336;">加载失败</p>';
            }
        }

        window.openNewPost = function() {
            var modal = document.getElementById('modalOverlay');
            modal.style.display = 'flex';
            document.getElementById('modalContent').innerHTML = '<h3>发帖</h3><input type="text" id="npTitle" placeholder="标题"><textarea id="npContent" rows="4" placeholder="内容"></textarea><div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;"><button class="btn btn-outline btn-sm" onclick="document.getElementById(\'modalOverlay\').style.display=\'none\'">取消</button><button class="btn btn-primary btn-sm" id="submitPost">发布</button></div>';
            document.getElementById('submitPost').onclick = async function(){
                var title = document.getElementById('npTitle').value.trim();
                var content = document.getElementById('npContent').value.trim();
                if (!title || !content) { showToast('请填写完整', 'error'); return; }
                await client.from('posts').insert({ title:title, content:content, author:currentUser, authorAvatar:currentUserData.avatar||'🐱', timestamp:Date.now(), likes:0, likedBy:[], replies:[] });
                modal.style.display = 'none';
                showToast('发布成功', 'success');
                await loadForum();
            };
        };

        window.viewPost = async function(postId) {
            var result = await client.from('posts').select('*').eq('id', postId).single();
            if (!result.data) return;
            var post = result.data;
            var replies = post.replies || [];
            document.getElementById('panel-forum').innerHTML = '<div class="card"><button class="btn btn-outline btn-sm" onclick="switchTab(\'forum\')">← 返回</button><div style="margin-top:12px;"><strong>' + escHtml(post.title) + '</strong><p>' + escHtml(post.content) + '</p><button class="btn btn-sm btn-outline" onclick="likePost(' + post.id + ')">❤️ ' + (post.likes||0) + '</button><button class="btn btn-sm btn-primary" onclick="openReply(' + post.id + ')">💬 回复</button></div></div><div class="card"><div class="card-header">💬 回复 (' + replies.length + ')</div>' + replies.map(function(r){ return '<div style="padding:8px;border-bottom:1px solid #e4decf;"><strong>' + escHtml(r.author) + '</strong><p>' + escHtml(r.content) + '</p></div>'; }).join('') + '<button class="btn btn-primary btn-sm" style="margin-top:8px;width:100%;" onclick="openReply(' + post.id + ')">回复</button></div>';
        };

        window.likePost = async function(postId) {
            var result = await client.from('posts').select('*').eq('id', postId).single();
            var post = result.data;
            if ((post.likedBy||[]).indexOf(currentUser) !== -1) { showToast('已点赞'); return; }
            await client.from('posts').update({ likes:(post.likes||0)+1, likedBy:(post.likedBy||[]).concat([currentUser]) }).eq('id', postId);
            showToast('❤️ 已点赞');
        };

        window.openReply = function(postId) {
            var modal = document.getElementById('modalOverlay');
            modal.style.display = 'flex';
            document.getElementById('modalContent').innerHTML = '<h3>回复</h3><textarea id="replyContent" rows="4"></textarea><div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;"><button class="btn btn-outline btn-sm" onclick="document.getElementById(\'modalOverlay\').style.display=\'none\'">取消</button><button class="btn btn-primary btn-sm" id="submitReply">发表</button></div>';
            document.getElementById('submitReply').onclick = async function(){
                var content = document.getElementById('replyContent').value.trim();
                if (!content) return;
                var result = await client.from('posts').select('*').eq('id', postId).single();
                var post = result.data;
                var newReplies = (post.replies||[]).concat([{ author:currentUser, content:content, timestamp:Date.now() }]);
                await client.from('posts').update({ replies:newReplies }).eq('id', postId);
                modal.style.display = 'none';
                showToast('回复成功');
                await viewPost(postId);
            };
        };

        async function loadMap() {
            var b = currentUserData ? (currentUserData.buildings || { farm:0, house:0, land:0 }) : { farm:0, house:0, land:0 };
            document.getElementById('panel-map').innerHTML = '<div class="card"><div class="card-header">🏗️ 基建中心</div><p>金币：🪙 ' + (currentUserData?currentUserData.gold||0:0) + '</p><div class="map-grid"><div class="build-card" onclick="build(\'farm\')"><div class="icon">🌾</div><div>农场</div><div>' + b.farm + '块</div><div>💰50金币</div></div><div class="build-card" onclick="build(\'house\')"><div class="icon">🏡</div><div>小屋</div><div>' + b.house + '间</div><div>💰200金币</div></div><div class="build-card" onclick="build(\'land\')"><div class="icon">🏔️</div><div>领地</div><div>' + b.land + '处</div><div>💰500金币</div></div></div></div>';
        }

        window.build = async function(type) {
            if (!currentUserData) return;
            var costs = { farm:50, house:200, land:500 };
            if ((currentUserData.gold||0) < costs[type]) { showToast('金币不足', 'error'); return; }
            var b = {};
            if (currentUserData.buildings) { b.farm = currentUserData.buildings.farm || 0; b.house = currentUserData.buildings.house || 0; b.land = currentUserData.buildings.land || 0; }
            b[type] = (b[type]||0) + 1;
            var newGold = currentUserData.gold - costs[type];
            await client.from('users').update({ gold:newGold, buildings:b }).eq('username', currentUser);
            currentUserData.gold = newGold;
            currentUserData.buildings = b;
            showToast('建设成功', 'success');
            await loadMap();
        };

        document.getElementById('loginBtn').addEventListener('click', async function(){
            var username = document.getElementById('loginUsername').value.trim();
            var password = document.getElementById('loginPassword').value;
            var mode = document.querySelector('.login-tab.active').dataset.mode;
            if (!username || !password) { showToast('请填写完整', 'error'); return; }
            
            // 馆长
            if (username === ADMIN_NAME && password === ADMIN_PASS) {
                currentUser = username;
                currentUserData = { username:username, level:99, gold:9999, avatar:'🐱', buildings:{farm:0,house:0,land:0} };
                document.getElementById('loginOverlay').classList.add('hidden');
                updateUI();
                await switchTab('forum');
                showToast('🌲 馆长大人！');
                return;
            }
            
            // 注册
            if (mode === 'register') {
                var check = await client.from('users').select('username').eq('username', username);
                if (check.data && check.data.length > 0) { showToast('该名号已存在', 'error'); return; }
                await client.from('users').insert({ username:username, password:password, level:1, exp:0, gold:200, avatar:'', totalPosts:0, totalReplies:0, friends:[], buildings:{farm:0,house:0,land:0} });
                showToast('注册成功！请登录', 'success');
                document.querySelector('.login-tab[data-mode="login"]').click();
                return;
            }
            
            // 登录
            var loginResult = await client.from('users').select('*').eq('username', username).single();
            if (!loginResult.data) { showToast('用户不存在', 'error'); return; }
            var user = loginResult.data;
            if (user.password !== password) { showToast('密码错误', 'error'); return; }
            currentUser = username;
            currentUserData = user;
            document.getElementById('loginOverlay').classList.add('hidden');
            updateUI();
            await switchTab('forum');
            showToast('🌲 欢迎 ' + username);
        });

        function handleLogout() { location.reload(); }

        document.querySelectorAll('.login-tab').forEach(function(t){
            t.addEventListener('click', function(){
                document.querySelectorAll('.login-tab').forEach(function(x){ x.classList.remove('active'); });
                this.classList.add('active');
            });
        });

        document.querySelectorAll('.nav-tab').forEach(function(t){
            t.addEventListener('click', function(){ switchTab(this.dataset.tab); });
        });

        document.getElementById('modalOverlay').addEventListener('click', function(e){
            if (e.target === this) this.style.display = 'none';
        });

        document.getElementById('loginPassword').addEventListener('keypress', function(e){
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });

        window.switchTab = switchTab;
        window.handleLogout = handleLogout;
    </script>
</body>
</html>
