<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🌲 雾凇会馆</title>
  <style>
    /* ===== 全局重置 & 基础 ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f7f8fa;
      color: #1d2129;
      font-size: 14px;
      padding-top: 100px;
      padding-bottom: 60px;
      -webkit-font-smoothing: antialiased;
    }
    a {
      text-decoration: none;
      color: inherit;
    }
    ul {
      list-style: none;
    }
    /* ===== 顶部导航（固定） ===== */
    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: #fff;
      border-bottom: 1px solid #e5e6eb;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 54px;
    }
    .top-nav .logo {
      font-weight: 700;
      font-size: 18px;
      color: #ff8200;
    }
    .top-nav .search-box {
      flex: 1;
      margin: 0 12px;
      position: relative;
    }
    .top-nav .search-box input {
      width: 100%;
      padding: 6px 12px 6px 32px;
      border: none;
      border-radius: 20px;
      background: #f2f3f5;
      font-size: 13px;
      outline: none;
      color: #1d2129;
    }
    .top-nav .search-box input::placeholder {
      color: #c9cdd4;
    }
    .top-nav .search-box .icon-search {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: #c9cdd4;
    }
    .top-nav .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      background-color: #ddd;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* ===== 封面区域（仅主页显示） ===== */
    .cover-section {
      width: 100%;
      position: relative;
    }
    .cover-wrapper {
      width: 100%;
      height: 220px;
      background-size: cover;
      background-position: center;
      background-color: #dde3ec;
      position: relative;
    }
    .cover-wrapper .cover-btn {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: rgba(0, 0, 0, 0.4);
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
    }
    .cover-wrapper .cover-btn::before {
      content: "🖼️";
      margin-right: 4px;
    }
    .cover-text {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      padding: 30px 16px 16px;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.45));
      color: #fff;
    }
    .cover-text h1 {
      font-size: 22px;
      font-weight: 600;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
    }
    .cover-text .sub {
      font-size: 14px;
      opacity: 0.85;
      display: block;
      margin-top: 2px;
    }
    .cover-text .weather {
      position: absolute;
      right: 16px;
      bottom: 16px;
      text-align: right;
      font-size: 13px;
      opacity: 0.8;
    }
    .cover-text .weather span {
      display: block;
    }

    /* 错位头像 */
    .avatar-large {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 4px solid #fff;
      background-size: cover;
      background-position: center;
      background-color: #ccc;
      position: absolute;
      left: 16px;
      bottom: -40px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      z-index: 2;
      cursor: pointer;
      text-align: center;
      line-height: 80px;
      font-size: 36px;
      color: #fff;
    }

    /* ===== 用户信息卡片（统计） ===== */
    .user-stats {
      background: #fff;
      border-radius: 16px;
      margin: 50px 16px 12px;
      padding: 12px 0;
      display: flex;
      justify-content: space-around;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
    }
    .user-stats .stat-item {
      text-align: center;
      flex: 1;
    }
    .user-stats .stat-item strong {
      display: block;
      font-size: 22px;
      color: #ff8200;
      font-weight: 600;
    }
    .user-stats .stat-item span {
      font-size: 13px;
      color: #86909c;
    }

    /* ===== 内容面板（主体） ===== */
    .main-content {
      padding: 0 16px 16px;
    }
    .panel {
      display: none;
    }
    .panel.active {
      display: block;
    }

    /* ===== 帖子列表 ===== */
    .post-item {
      background: #fff;
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
      cursor: pointer;
      transition: all 0.2s;
    }
    .post-item:hover {
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }
    .post-item .post-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .post-item .post-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .post-item .post-author {
      font-weight: 500;
      font-size: 15px;
    }
    .post-item .post-time {
      font-size: 12px;
      color: #86909c;
      margin-left: auto;
    }
    .post-item .post-title {
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 4px;
    }
    .post-item .post-content-preview {
      color: #4e5a6b;
      font-size: 14px;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .post-item .post-footer {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: #86909c;
    }
    .post-item .post-footer span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ===== 板块筛选 ===== */
    .board-filter {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .board-filter .board-tab {
      padding: 4px 16px;
      border-radius: 20px;
      background: #f2f3f5;
      color: #86909c;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .board-filter .board-tab.active {
      background: #ff8200;
      color: #fff;
    }

    /* ===== 发帖按钮 ===== */
    .post-btn {
      position: fixed;
      right: 20px;
      bottom: 80px;
      background: #ff8200;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 56px;
      height: 56px;
      font-size: 28px;
      box-shadow: 0 4px 12px rgba(255, 130, 0, 0.3);
      cursor: pointer;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }
    .post-btn:hover {
      transform: scale(1.05);
    }

    /* ===== 底部Tab导航（固定） ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-top: 1px solid #e5e6eb;
      display: flex;
      justify-content: space-around;
      padding: 6px 0 10px;
      z-index: 1000;
      height: 60px;
    }
    .bottom-nav .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 12px;
      color: #86909c;
      cursor: pointer;
      transition: color 0.2s;
      gap: 2px;
    }
    .bottom-nav .tab-item .tab-icon {
      font-size: 22px;
      line-height: 1;
    }
    .bottom-nav .tab-item.active {
      color: #ff8200;
    }
    .bottom-nav .tab-item.active .tab-icon {
      color: #ff8200;
    }

    /* ===== 好友、聊天、委托列表样式 ===== */
    .friend-item,
    .task-item,
    .chat-item {
      background: #fff;
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .friend-item .friend-info,
    .task-item .task-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .friend-item .friend-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #ddd;
      background-size: cover;
      background-position: center;
    }
    .friend-item .friend-name {
      font-weight: 500;
    }
    .friend-item .friend-action,
    .task-item .task-action {
      display: flex;
      gap: 8px;
    }

    /* ===== 按钮 ===== */
    .btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #ff8200;
      color: #fff;
    }
    .btn-primary:hover {
      background: #e67500;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #ff8200;
      color: #ff8200;
    }
    .btn-danger {
      background: #f53f3f;
      color: #fff;
    }
    .btn-success {
      background: #22c55e;
      color: #fff;
    }
    .btn-sm {
      padding: 4px 12px;
      font-size: 12px;
    }

    /* ===== 模态框 ===== */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show {
      display: flex;
    }
    .modal {
      background: #fff;
      border-radius: 20px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal h3 {
      font-size: 18px;
      margin-bottom: 16px;
    }
    .modal input,
    .modal textarea,
    .modal select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e5e6eb;
      border-radius: 10px;
      margin-bottom: 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    .modal input:focus,
    .modal textarea:focus {
      border-color: #ff8200;
    }
    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 12px;
    }

    /* ===== Toast ===== */
    .toast-container {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3000;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .toast {
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      animation: fadeIn 0.3s;
    }
    .toast.success {
      background: rgba(34, 197, 94, 0.9);
    }
    .toast.error {
      background: rgba(245, 63, 63, 0.9);
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== 登录遮罩 ===== */
    .login-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(30, 40, 60, 0.6);
      backdrop-filter: blur(12px);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-overlay.hidden {
      display: none;
    }
    .login-card {
      background: #fff;
      border-radius: 24px;
      padding: 32px 24px;
      width: 340px;
      max-width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    }
    .login-card .login-cat {
      font-size: 3rem;
    }
    .login-card .login-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: #ff8200;
    }
    .login-card .login-sub {
      color: #86909c;
      margin: 6px 0 20px;
    }
    .login-card .login-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .login-card .login-tab {
      flex: 1;
      padding: 8px;
      border-radius: 20px;
      background: #f2f3f5;
      cursor: pointer;
      font-weight: 500;
      transition: 0.2s;
    }
    .login-card .login-tab.active {
      background: #ff8200;
      color: #fff;
    }
    .login-card .login-input {
      width: 100%;
      padding: 12px;
      border: 1px solid #e5e6eb;
      border-radius: 12px;
      margin-bottom: 12px;
      text-align: center;
      font-size: 15px;
      outline: none;
    }
    .login-card .login-input:focus {
      border-color: #ff8200;
    }
    .login-card .login-btn {
      width: 100%;
      padding: 12px;
      background: #ff8200;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }
    .login-card .login-btn:hover {
      background: #e67500;
    }
    .login-card .login-error {
      color: #f53f3f;
      font-size: 13px;
      margin-top: 8px;
    }

    /* ===== 响应式适配 ===== */
    @media (max-width: 480px) {
      .top-nav .logo {
        font-size: 16px;
      }
      .top-nav .search-box input {
        font-size: 12px;
        padding: 4px 8px 4px 28px;
      }
      .cover-wrapper {
        height: 180px;
      }
      .avatar-large {
        width: 70px;
        height: 70px;
        line-height: 70px;
        font-size: 30px;
        bottom: -35px;
      }
      .user-stats {
        margin: 42px 12px 12px;
        padding: 10px 0;
      }
      .user-stats .stat-item strong {
        font-size: 20px;
      }
      .post-item {
        padding: 12px 14px;
      }
      .post-btn {
        width: 48px;
        height: 48px;
        font-size: 24px;
        bottom: 72px;
        right: 16px;
      }
    }
  </style>
</head>
<body>

  <!-- ===== 登录遮罩 ===== -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <div class="login-cat">🐱</div>
      <div class="login-title">雾凇会馆</div>
      <div class="login-sub">—— 东北吉林 · 妖精公会 ——</div>
      <div class="login-tabs">
        <div class="login-tab active" data-mode="login">登录</div>
        <div class="login-tab" data-mode="register">注册</div>
      </div>
      <input type="text" class="login-input" id="loginUsername" placeholder="妖精名号">
      <input type="password" class="login-input" id="loginPassword" placeholder="密码">
      <div class="login-error" id="loginError"></div>
      <button class="login-btn" id="loginBtn">进入会馆</button>
    </div>
  </div>

  <!-- ===== 主应用 ===== -->
  <div id="appContainer" style="display:none;">

    <!-- ===== 顶部导航 ===== -->
    <div class="top-nav">
      <div class="logo">🌲 雾凇</div>
      <div class="search-box">
        <span class="icon-search">🔍</span>
        <input type="text" placeholder="搜索用户/帖子" id="searchInput">
      </div>
      <div class="user-avatar" id="headerAvatar" onclick="location.reload()"></div>
    </div>

    <!-- ===== 封面+用户信息（仅主页显示） ===== -->
    <div class="cover-section" id="homeCover">
      <div class="cover-wrapper" id="coverWrapper">
        <button class="cover-btn" id="changeCoverBtn">更换封面</button>
        <div class="cover-text">
          <h1 id="userTitle">雾凇会馆 · admin</h1>
          <span class="sub" id="userSignature">这个人很懒，什么都没写~</span>
          <div class="weather">
            <span>吉林</span>
            <span id="currentDate">6月27日</span>
          </div>
        </div>
        <div class="avatar-large" id="mainAvatar">🐱</div>
      </div>
    </div>

    <!-- ===== 统计卡片 ===== -->
    <div class="user-stats" id="homeStats">
      <div class="stat-item"><strong id="countPosts">0</strong><span>帖子</span></div>
      <div class="stat-item"><strong id="countFriends">0</strong><span>好友</span></div>
      <div class="stat-item"><strong id="countGold">0</strong><span>金币</span></div>
    </div>

    <!-- ===== 内容面板 ===== -->
    <div class="main-content" id="mainContent">
      <!-- 主页面板 -->
      <div class="panel active" id="panel-forum">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
          <div class="board-filter" id="boardFilter">
            <span class="board-tab active" data-board="all">全部</span>
          </div>
          <button class="btn btn-primary btn-sm" id="newPostBtn">发帖</button>
        </div>
        <div id="postsList">加载中...</div>
      </div>

      <!-- 委托面板 -->
      <div class="panel" id="panel-tasks"></div>

      <!-- 好友面板 -->
      <div class="panel" id="panel-friends"></div>

      <!-- 聊天面板 -->
      <div class="panel" id="panel-chat"></div>
    </div>

    <!-- ===== 底部Tab导航 ===== -->
    <div class="bottom-nav" id="bottomNav">
      <div class="tab-item active" data-tab="forum">
        <span class="tab-icon">🏠</span>
        <span>主页</span>
      </div>
      <div class="tab-item" data-tab="tasks">
        <span class="tab-icon">📋</span>
        <span>委托</span>
      </div>
      <div class="tab-item" data-tab="friends">
        <span class="tab-icon">👥</span>
        <span>好友</span>
      </div>
      <div class="tab-item" data-tab="chat">
        <span class="tab-icon">💬</span>
        <span>聊天</span>
      </div>
    </div>

    <!-- ===== 悬浮发帖按钮 ===== -->
    <button class="post-btn" id="floatingPostBtn">✏️</button>

  </div>

  <!-- ===== Toast & 模态框 ===== -->
  <div class="toast-container" id="toastContainer"></div>
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
  </div>

  <!-- ===== Supabase + JS ===== -->
  <script type="importmap">
    {
      "imports": {
        "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"
      }
    }
  </script>

    const currentDate = $('currentDate');
    const countPosts = $('countPosts');
    const countFriends = $('countFriends');
    const countGold = $('countGold');
    const boardFilter = $('boardFilter');
    const postsList = $('postsList');
    const newPostBtn = $('newPostBtn');
    const floatingPostBtn = $('floatingPostBtn');
    const searchInput = $('searchInput');

    // ============================================================
    // 工具函数
    // ============================================================
    function toast(msg, type = '') {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      toastContainer.appendChild(el);
      setTimeout(() => el.remove(), 2500);
    }

    function escHtml(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function timeAgo(ts) {
      if (!ts) return '未知';
      const diff = Date.now() - new Date(ts).getTime();
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
      if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
      if (diff < 2592000000) return Math.floor(diff / 86400000) + '天前';
      return new Date(ts).toLocaleDateString();
    }

    function closeModal() {
      modalOverlay.classList.remove('show');
      modalContent.innerHTML = '';
    }

    async function hashPassword(pw) {
      const enc = new TextEncoder();
      const data = enc.encode(pw + 'fog-salt-2026');
      const buf = await crypto.subtle.digest('SHA-256', data);
      const arr = Array.from(new Uint8Array(buf));
      return arr.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function updateDate() {
      const now = new Date();
      currentDate.textContent = (now.getMonth() + 1) + '月' + now.getDate() + '日';
    }
    updateDate();

    // ============================================================
    // 登录 / 注册
    // ============================================================
    let loginMode = 'login';
    loginTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        loginTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        loginMode = tab.dataset.mode;
        loginError.textContent = '';
      });
    });

    loginBtn.addEventListener('click', async () => {
      const username = loginUsername.value.trim();
      const password = loginPassword.value;
      if (!username || !password) {
        loginError.textContent = '请填写完整';
        return;
      }
      loginError.textContent = '';
      try {
        if (loginMode === 'register') {
          const { data: existing } = await supabase.from('users').select('id').eq('username', username)
            .maybeSingle();
          if (existing) {
            loginError.textContent = '用户名已被占用';
            return;
          }
          const passwordHash = await hashPassword(password);
          const { error } = await supabase.from('users').insert([{
            username,
            password_hash: passwordHash
          }]);
          if (error) throw error;
          toast('注册成功！请登录', 'success');
          loginTabs.forEach(t => t.classList.remove('active'));
          document.querySelector('.login-tab[data-mode="login"]').classList.add('active');
          loginMode = 'login';
          loginPassword.value = '';
          loginUsername.value = '';
        } else {
          const { data: user, error } = await supabase.from('users').select('*').eq('username', username)
            .maybeSingle();
          if (error || !user) {
            loginError.textContent = '用户名不存在';
            return;
          }
          const inputHash = await hashPassword(password);
          if (inputHash !== user.password_hash) {
            loginError.textContent = '密码错误';
            return;
          }
          currentUser = user;
          loginOverlay.classList.add('hidden');
          appContainer.style.display = 'block';
          updateUI();
          currentTab = 'forum';
          renderCurrentTab();
          startChatSubscription();
          toast(`🌲 欢迎 ${user.username}`);
        }
      } catch (err) {
        loginError.textContent = err.message || '操作失败';
        console.error(err);
      }
    });

    // ============================================================
    // UI 更新
    // ============================================================
    function updateUI() {
      if (!currentUser) return;
      const u = currentUser;
      headerAvatar.style.backgroundImage = u.avatar_url ? `url('${u.avatar_url}')` : '';
      userTitle.textContent = `雾凇会馆 · ${u.username}`;
      userSignature.textContent = u.bio || '这个人很懒，什么都没写~';
      if (u.avatar_url) {
        mainAvatar.style.backgroundImage = `url('${u.avatar_url}')`;
        mainAvatar.style.backgroundSize = 'cover';
        mainAvatar.textContent = '';
      } else {
        mainAvatar.style.backgroundImage = 'none';
        mainAvatar.textContent = u.avatar || '🐱';
      }
      countGold.textContent = u.gold || 0;
      if (coverWrapper) {
        const coverUrl = u.cover_url || PRESET_COVERS[0];
        coverWrapper.style.backgroundImage = `url('${coverUrl}')`;
      }
      updateCounts();
    }

    async function updateCounts() {
      if (!currentUser) return;
      const { count: fCount } = await supabase.from('friends').select('*', { count: 'exact', head: true })
        .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`).eq('status', 'accepted');
      countFriends.textContent = fCount || 0;
      const { count: pCount } = await supabase.from('posts').select('*', { count: 'exact', head: true })
        .eq('author_id', currentUser.id);
      countPosts.textContent = pCount || 0;
    }

    // ============================================================
    // 封面更换
    // ============================================================
    async function setCover(url) {
      const { error } = await supabase.from('users').update({ cover_url: url }).eq('id', currentUser.id);
      if (error) { toast('更换失败: ' + error.message, 'error'); return; }
      currentUser.cover_url = url;
      updateUI();
      toast('封面已更新', 'success');
    }

    changeCoverBtn.addEventListener('click', () => {
      if (!currentUser) { toast('请先登录', 'error'); return; }
      let gridHtml = '<div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:8px;">';
      PRESET_COVERS.forEach(url => {
        gridHtml += `<div data-url="${url}" style="height:70px; background-size:cover; background-position:center; border-radius:8px; cursor:pointer; border:2px solid transparent;" onclick="this.style.borderColor='#ff8200'"></div>`;
      });
      gridHtml += '</div>';

      modalContent.innerHTML = `
        <h3>🖼️ 更换封面</h3>
        <p style="color:#86909c;font-size:13px;">点击图片替换封面，或上传自定义</p>
        ${gridHtml}
        <div style="margin-top:12px; display:flex; gap:8px;">
          <input type="file" id="coverUploadInput" accept="image/*" style="flex:1;">
          <button class="btn btn-primary btn-sm" id="coverUploadBtn">上传</button>
        </div>
        <div class="modal-actions">
          <button class="btn btn-outline btn-sm" id="modalCancel">取消</button>
        </div>
      `;
      modalOverlay.classList.add('show');

      document.querySelectorAll('[data-url]').forEach(el => {
        el.style.backgroundImage = `url('${el.dataset.url}')`;
        el.addEventListener('click', async () => {
          await setCover(el.dataset.url);
          closeModal();
        });
      });

      document.getElementById('coverUploadBtn').addEventListener('click', async () => {
        const input = document.getElementById('coverUploadInput');
        const file = input.files[0];
        if (!file) { toast('请选择图片', 'error'); return; }
        const ext = file.name.split('.').pop();
        const name = `cover_${currentUser.id}_${Date.now()}.${ext}`;
        const { error } = await supabase.storage.from('avatars').upload(name, file);
        if (error) { toast('上传失败: ' + error.message, 'error'); return; }
        const { data: urlData } = supabase.storage.from('avatars').getPublicUrl(name);
        await setCover(urlData.publicUrl);
        closeModal();
      });

      document.getElementById('modalCancel').addEventListener('click', closeModal);
    });

    // ============================================================
    // 头像上传（点击大头像）
    // ============================================================
    mainAvatar.addEventListener('click', () => {
      if (!currentUser) return;
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const allowed = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
        if (!allowed.includes(file.type)) {
          toast('只支持 JPG, PNG, GIF, WebP', 'error');
          return;
        }
        if (file.size > 2 * 1024 * 1024) {
          toast('图片不能超过 2MB', 'error');
          return;
        }
        const ext = file.name.split('.').pop();
        const name = `${currentUser.id}_${Date.now()}.${ext}`;
        const { error } = await supabase.storage.from('avatars').upload(name, file);
        if (error) {
          toast('上传失败: ' + error.message, 'error');
          return;
        }
        const { data: urlData } = supabase.storage.from('avatars').getPublicUrl(name);
        await supabase.from('users').update({ avatar_url: urlData.publicUrl }).eq('id', currentUser.id);
        currentUser.avatar_url = urlData.publicUrl;
        updateUI();
        toast('头像更新成功', 'success');
      };
      input.click();
    });

    // ============================================================
    // 底部Tab切换
    // ============================================================
    bottomTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        bottomTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const tabName = tab.dataset.tab;
        currentTab = tabName;
        viewingPostId = null;
        // 控制封面和统计卡片的显示（仅在主页显示）
        if (tabName === 'forum') {
          homeCover.style.display = 'block';
          homeStats.style.display = 'flex';
        } else {
          homeCover.style.display = 'none';
          homeStats.style.display = 'none';
        }
        renderCurrentTab();
      });
    });

    // 悬浮发帖按钮
    floatingPostBtn.addEventListener('click', () => {
      if (currentTab !== 'forum') {
        // 切换到主页
        bottomTabs.forEach(t => t.classList.remove('active'));
        document.querySelector('.tab-item[data-tab="forum"]').classList.add('active');
        currentTab = 'forum';
        homeCover.style.display = 'block';
        homeStats.style.display = 'flex';
        renderCurrentTab();
      }
      openNewPost();
    });

    // 发帖按钮（主页内）
    newPostBtn.addEventListener('click', openNewPost);

    // ============================================================
    // 渲染面板
    // ============================================================
    function renderCurrentTab() {
      // 显示对应面板
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      const panelId = `panel-${currentTab}`;
      const panel = document.getElementById(panelId);
      if (panel) panel.classList.add('active');

      switch (currentTab) {
        case 'forum':
          renderForum();
          break;
        case 'tasks':
          renderTasks();
          break;
        case 'friends':
          renderFriends();
          break;
        case 'chat':
          renderChat();
          break;
      }
    }

    // ============================================================
    // 论坛（帖子列表）
    // ============================================================
    async function renderForum() {
      if (viewingPostId) {
        await renderPostDetail(viewingPostId);
        return;
      }
      // 获取板块
      const { data: boards } = await supabase.from('boards').select('*').order('sort_order');
      let filterHtml = `<span class="board-tab active" data-board="all">全部</span>`;
      if (boards) {
        boards.forEach(b => {
          filterHtml += `<span class="board-tab" data-board="${b.id}">${escHtml(b.name)}</span>`;
        });
      }
      boardFilter.innerHTML = filterHtml;

      // 绑定板块点击
      boardFilter.querySelectorAll('.board-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          boardFilter.querySelectorAll('.board-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          const boardId = tab.dataset.board === 'all' ? null : parseInt(tab.dataset.board);
          loadPosts(boardId);
        });
      });

      // 加载帖子
      loadPosts(null);
    }

    async function loadPosts(boardId) {
      postsList.innerHTML = '<div style="text-align:center;padding:20px;color:#86909c;">加载中...</div>';
      let query = supabase.from('posts_with_authors').select('*');
      if (boardId) query = query.eq('board_id', boardId);
      query = query.order('created_at', { ascending: false });
      const { data: posts, error } = await query;
      if (error) {
        postsList.innerHTML = `<p style="color:#f53f3f;">加载失败: ${error.message}</p>`;
        return;
      }
      if (!posts || posts.length === 0) {
        postsList.innerHTML = '<p style="text-align:center;color:#86909c;">暂无帖子</p>';
        return;
      }
      const ids = posts.map(p => p.id);
      const { data: stats } = await supabase.from('posts_stats').select('*').in('id', ids);
      const statMap = {};
      if (stats) stats.forEach(s => { statMap[s.id] = s; });

      let html = '';
      for (const post of posts) {
        const replyCount = statMap[post.id]?.reply_count || 0;
        const likeCount = statMap[post.id]?.like_count || 0;
        html += `
          <div class="post-item" data-postid="${post.id}">
            <div class="post-header">
              <div class="post-avatar">${escHtml(post.avatar || '🐱')}</div>
              <span class="post-author">${escHtml(post.username || '已注销')}</span>
              <span class="post-time">${timeAgo(post.created_at)}</span>
            </div>
            <div class="post-title">${escHtml(post.title)}</div>
            <div class="post-content-preview">${escHtml(post.content)}</div>
            <div class="post-footer">
              <span>❤️ ${likeCount}</span>
              <span>💬 ${replyCount}</span>
              ${post.board_name ? `<span># ${escHtml(post.board_name)}</span>` : ''}
            </div>
          </div>
        `;
      }
      postsList.innerHTML = html;

      // 点击帖子进入详情
      document.querySelectorAll('.post-item').forEach(el => {
        el.addEventListener('click', () => {
          viewingPostId = parseInt(el.dataset.postid);
          renderForum();
        });
      });
    }

    // ============================================================
    // 帖子详情
    // ============================================================
    async function renderPostDetail(postId) {
      const { data: post, error } = await supabase.from('posts_with_authors').select('*').eq('id', postId)
      .single();
      if (error || !post) {
        toast('帖子不存在', 'error');
        viewingPostId = null;
        renderForum();
        return;
      }
      const { data: replies } = await supabase.from('replies')
        .select('*, users!author_id (username, avatar, avatar_url)').eq('post_id', postId)
        .order('created_at', { ascending: true });
      const { count: likeCount } = await supabase.from('likes').select('*', { count: 'exact', head: true })
        .eq('post_id', postId);
      let userLiked = false;
      if (currentUser) {
        const { data: likeData } = await supabase.from('likes').select('*').eq('post_id', postId)
          .eq('user_id', currentUser.id).maybeSingle();
        userLiked = !!likeData;
      }
      const replyList = replies || [];
      const isAuthor = currentUser && currentUser.id === post.author_id;

      let html = `
        <div style="background:#fff; border-radius:16px; padding:16px; margin-bottom:12px;">
          <button class="btn btn-outline btn-sm" id="backToList">← 返回</button>
          <h2 style="font-size:18px; margin:12px 0 4px;">${escHtml(post.title)}</h2>
          <div style="color:#86909c; font-size:13px; margin-bottom:12px;">${escHtml(post.username)} · ${timeAgo(post.created_at)}</div>
          <div style="background:#f7f8fa; padding:12px; border-radius:10px; white-space:pre-wrap; word-break:break-word;">${escHtml(post.content)}</div>
          <div style="display:flex; gap:12px; margin-top:12px; flex-wrap:wrap;">
            <button class="btn ${userLiked ? 'btn-primary' : 'btn-outline'} btn-sm" id="likeBtn">${userLiked ? '❤️' : '🤍'} ${likeCount}</button>
            <button class="btn btn-primary btn-sm" id="replyBtn">💬 回复</button>
            ${isAuthor ? `<button class="btn btn-danger btn-sm" id="deletePostBtn">删除</button>` : ''}
          </div>
        </div>
        <div style="background:#fff; border-radius:16px; padding:16px;">
          <strong>💬 回复 (${replyList.length})</strong>
          ${replyList.length === 0 ? '<p style="color:#86909c;">还没有回复</p>' : ''}
          ${replyList.map(r => {
            const a = r.users || { username:'已注销', avatar:'👻' };
            return `<div style="border-bottom:1px solid #f2f3f5; padding:10px 0;">
              <div style="display:flex; align-items:center; gap:8px;">
                <span>${escHtml(a.avatar || '🐱')}</span>
                <strong>${escHtml(a.username)}</strong>
                <span style="color:#86909c; font-size:12px;">${timeAgo(r.created_at)}</span>
              </div>
              <div style="margin-top:4px;">${escHtml(r.content)}</div>
            </div>`;
          }).join('')}
        </div>
      `;
      postsList.innerHTML = html;

      document.getElementById('backToList').addEventListener('click', () => {
        viewingPostId = null;
        renderForum();
      });
      document.getElementById('likeBtn')?.addEventListener('click', async () => {
        if (!currentUser) { toast('请先登录', 'error'); return; }
        const { data: existing } = await supabase.from('likes').select('*').eq('post_id', postId)
          .eq('user_id', currentUser.id).maybeSingle();
        if (existing) {
          await supabase.from('likes').delete().eq('post_id', postId).eq('user_id', currentUser.id);
          toast('已取消点赞');
        } else {
          await supabase.from('likes').insert([{ post_id: postId, user_id: currentUser.id }]);
          toast('❤️ 点赞成功', 'success');
        }
        renderPostDetail(postId);
      });
      document.getElementById('replyBtn').addEventListener('click', () => openReply(postId));
      document.getElementById('deletePostBtn')?.addEventListener('click', async () => {
        if (!confirm('确定删除此帖吗？')) return;
        await supabase.from('posts').delete().eq('id', postId);
        toast('帖子已删除', 'success');
        viewingPostId = null;
        renderForum();
        updateUI();
      });
    }

    // ============================================================
    // 发帖、回复、编辑
    // ============================================================
    function openNewPost() {
      if (!currentUser) { toast('请先登录', 'error'); return; }
      supabase.from('boards').select('*').order('sort_order').then(({ data: boards }) => {
        const options = boards.map(b => `<option value="${b.id}">${escHtml(b.name)}</option>`).join('');
        modalContent.innerHTML = `
          <h3>✏️ 发新帖</h3>
          <div><label style="font-size:13px;color:#86909c;">选择板块：</label><select id="newPostBoard">${options}</select></div>
          <input type="text" id="newPostTitle" placeholder="标题" maxlength="100">
          <textarea id="newPostContent" rows="4" placeholder="内容"></textarea>
          <div class="modal-actions">
            <button class="btn btn-outline btn-sm" id="modalCancel">取消</button>
            <button class="btn btn-primary btn-sm" id="modalConfirm">发布</button>
          </div>
        `;
        modalOverlay.classList.add('show');
        document.getElementById('modalCancel').addEventListener('click', closeModal);
        document.getElementById('modalConfirm').addEventListener('click', async () => {
          const boardId = parseInt(document.getElementById('newPostBoard').value);
          const title = document.getElementById('newPostTitle').value.trim();
          const content = document.getElementById('newPostContent').value.trim();
          if (!title || !content) { toast('请填写完整', 'error'); return; }
          const { error } = await supabase.from('posts').insert([{
            title,
            content,
            author_id: currentUser.id,
            board_id: boardId
          }]);
          if (error) { toast('发布失败: ' + error.message, 'error'); return; }
          toast('发布成功', 'success');
          closeModal();
          viewingPostId = null;
          renderForum();
          updateUI();
        });
      }).catch(() => toast('加载板块失败', 'error'));
    }

    function openReply(postId) {
      if (!currentUser) { toast('请先登录', 'error'); return; }
      modalContent.innerHTML = `
        <h3>💬 回复</h3>
        <textarea id="replyContent" rows="3" placeholder="写回复..."></textarea>
        <div class="modal-actions">
          <button class="btn btn-outline btn-sm" id="modalCancel">取消</button>
          <button class="btn btn-primary btn-sm" id="modalConfirm">发表</button>
        </div>
      `;
      modalOverlay.classList.add('show');
      document.getElementById('modalCancel').addEventListener('click', closeModal);
      document.getElementById('modalConfirm').addEventListener('click', async () => {
        const content = document.getElementById('replyContent').value.trim();
        if (!content) { toast('请填写内容', 'error'); return; }
        const { error } = await supabase.from('replies').insert([{
          post_id: postId,
          author_id: currentUser.id,
          content
        }]);
        if (error) { toast('回复失败: ' + error.message, 'error'); return; }
        toast('回复成功', 'success');
        closeModal();
        renderPostDetail(postId);
        updateUI();
      });
    }

    // ============================================================
    // 任务委托
    // ============================================================
    async function renderTasks() {
      if (!currentUser) {
        panelTasks.innerHTML = '<div style="text-align:center;padding:30px;color:#86909c;">请先登录</div>';
        return;
      }
      const { data: tasks } = await supabase.from('tasks')
        .select('*, publisher:users!publisher_id (username, avatar_url), acceptor:users!accepted_by (username, avatar_url)')
        .order('created_at', { ascending: false });
      let html = `
        <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
          <strong>📋 委托任务</strong>
          <button class="btn btn-primary btn-sm" id="newTaskBtn">发布任务</button>
        </div>
        <div id="taskList"></div>
      `;
      panelTasks.innerHTML = html;
      document.getElementById('newTaskBtn').addEventListener('click', openNewTask);

      function renderTaskList(filter) {
        let filtered = tasks || [];
        if (filter === 'pending') filtered = filtered.filter(t => t.status === 'pending');
        else if (filter === 'in_progress') filtered = filtered.filter(t => t.status === 'in_progress');
        else if (filter === 'completed') filtered = filtered.filter(t => t.status === 'completed');
        else if (filter === 'mine') filtered = filtered.filter(t => t.publisher_id === currentUser.id);
        else if (filter === 'accepted') filtered = filtered.filter(t => t.accepted_by === currentUser.id);

        const listDiv = document.getElementById('taskList');
        if (!filtered.length) {
          listDiv.innerHTML = '<p style="color:#86909c;text-align:center;">暂无任务</p>';
          return;
        }
        let html = '';
        for (const task of filtered) {
          const isPublisher = task.publisher_id === currentUser.id;
          const isAcceptor = task.accepted_by === currentUser.id;
          const canAccept = task.status === 'pending' && !isPublisher && !task.accepted_by;
          const canComplete = task.status === 'in_progress' && isAcceptor;
          const canConfirm = task.status === 'in_progress' && isPublisher;
          html += `
            <div class="task-item">
              <div class="task-info">
                <div>
                  <strong>${escHtml(task.title)}</strong>
                  <span style="font-size:12px; color:#86909c;">${task.status === 'pending' ? '待领取' : task.status === 'in_progress' ? '进行中' : '已完成'}</span>
                  <div style="font-size:13px; color:#4e5a6b;">${escHtml(task.description || '')}</div>
                  <div style="font-size:12px; color:#86909c;">发布者：${escHtml(task.publisher?.username)} · ${timeAgo(task.created_at)}</div>
                </div>
                <div style="font-weight:600; color:#ff8200;">🪙 ${task.reward_gold}</div>
              </div>
              <div class="task-action">
                ${canAccept ? `<button class="btn btn-success btn-sm accept-task" data-id="${task.id}">领取</button>` : ''}
                ${canComplete ? `<button class="btn btn-primary btn-sm complete-task" data-id="${task.id}">申请完成</button>` : ''}
                ${canConfirm ? `<button class="btn btn-success btn-sm confirm-task" data-id="${task.id}">确认完成</button>` : ''}
                ${isPublisher && task.status === 'pending' ? `<button class="btn btn-danger btn-sm delete-task" data-id="${task.id}">删除</button>` : ''}
              </div>
            </div>
          `;
        }
        listDiv.innerHTML = html;

        listDiv.querySelectorAll('.accept-task').forEach(btn => {
          btn.addEventListener('click', async () => {
            const id = parseInt(btn.dataset.id);
            const { error } = await supabase.from('tasks').update({ status: 'in_progress',
              accepted_by: currentUser.id }).eq('id', id);
            if (error) { toast('领取失败', 'error'); return; }
            toast('领取成功', 'success');
            renderTasks();
          });
        });
        listDiv.querySelectorAll('.complete-task').forEach(btn => {
          btn.addEventListener('click', () => toast('已通知发布者', 'success'));
        });
        listDiv.querySelectorAll('.confirm-task').forEach(btn => {
          btn.addEventListener('click', async () => {
            const id = parseInt(btn.dataset.id);
            const { data: task } = await supabase.from('tasks').select('reward_gold, accepted_by')
              .eq('id', id).single();
            if (!task || !task.accepted_by) { toast('任务信息有误', 'error'); return; }
            const { data: acceptor } = await supabase.from('users').select('gold').eq('id', task
              .accepted_by).single();
            if (!acceptor) { toast('领取者不存在', 'error'); return; }
            const newGold = acceptor.gold + task.reward_gold;
            await supabase.from('users').update({ gold: newGold }).eq('id', task.accepted_by);
            await supabase.from('tasks').update({ status: 'completed' }).eq('id', id);
            toast('任务完成！金币已发放', 'success');
            renderTasks();
            updateUI();
          });
        });
        listDiv.querySelectorAll('.delete-task').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (!confirm('删除此任务？')) return;
            await supabase.from('tasks').delete().eq('id', parseInt(btn.dataset.id));
            toast('已删除', 'success');
            renderTasks();
          });
        });
      }

      // 添加筛选按钮
      const filterDiv = document.createElement('div');
      filterDiv.style.cssText = 'display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap;';
      const filters = ['all', 'pending', 'in_progress', 'completed', 'mine', 'accepted'];
      const labels = ['全部', '待领取', '进行中', '已完成', '我发布的', '我接受的'];
      filters.forEach((f, i) => {
        const btn = document.createElement('span');
        btn.textContent = labels[i];
        btn.className = 'btn btn-outline btn-sm';
        if (f === 'all') btn.style.background = '#ff8200';
        btn.dataset.filter = f;
        btn.style.cursor = 'pointer';
        btn.addEventListener('click', () => {
          filterDiv.querySelectorAll('span').forEach(b => { b.style.background = 'transparent'; });
          btn.style.background = '#ff8200';
          renderTaskList(f);
        });
        filterDiv.appendChild(btn);
      });
      panelTasks.insertBefore(filterDiv, document.getElementById('taskList'));
      renderTaskList('all');
    }

    function openNewTask() {
      if (!currentUser) { toast('请先登录', 'error'); return; }
      modalContent.innerHTML = `
        <h3>📝 发布任务</h3>
        <input type="text" id="taskTitle" placeholder="任务标题">
        <textarea id="taskDesc" rows="3" placeholder="任务描述"></textarea>
        <input type="number" id="taskReward" placeholder="奖励金币" min="1" value="10">
        <div class="modal-actions">
          <button class="btn btn-outline btn-sm" id="modalCancel">取消</button>
          <button class="btn btn-primary btn-sm" id="modalConfirm">发布</button>
        </div>
      `;
      modalOverlay.classList.add('show');
      document.getElementById('modalCancel').addEventListener('click', closeModal);
      document.getElementById('modalConfirm').addEventListener('click', async () => {
        const title = document.getElementById('taskTitle').value.trim();
        const desc = document.getElementById('taskDesc').value.trim();
        const reward = parseInt(document.getElementById('taskReward').value);
        if (!title || !desc) { toast('请填写完整', 'error'); return; }
        if (reward < 1) { toast('奖励必须大于0', 'error'); return; }
        if (reward > (currentUser.gold || 0)) { toast('金币不足', 'error'); return; }
        const newGold = currentUser.gold - reward;
        await supabase.from('users').update({ gold: newGold }).eq('id', currentUser.id);
        currentUser.gold = newGold;
        const { error } = await supabase.from('tasks').insert([{
          title,
          description: desc,
          reward_gold: reward,
          publisher_id: currentUser.id
        }]);
        if (error) { toast('发布失败', 'error'); return; }
        toast('发布成功', 'success');
        closeModal();
        renderTasks();
        updateUI();
      });
    }

    // ============================================================
    // 好友
    // ============================================================
    async function renderFriends() {
      if (!currentUser) {
        panelFriends.innerHTML = '<div style="text-align:center;padding:30px;color:#86909c;">请先登录</div>';
        return;
      }
      const { data: friendRows } = await supabase.from('friends')
        .select('*, sender:users!friends_sender_id_fkey (id, username, avatar_url), receiver:users!friends_receiver_id_fkey (id, username, avatar_url)')
        .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`).eq('status', 'accepted');
      const { data: pending } = await supabase.from('friends')
        .select('*, sender:users!friends_sender_id_fkey (id, username, avatar_url)')
        .eq('receiver_id', currentUser.id).eq('status', 'pending');

      let html = `
        <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
          <strong>👥 好友</strong>
          <div style="display:flex; gap:8px;">
            <input type="text" id="searchFriendInput" placeholder="搜索名号" style="flex:1; padding:4px 12px; border:1px solid #e5e6eb; border-radius:20px; font-size:13px;">
            <button class="btn btn-primary btn-sm" id="searchFriendBtn">搜索</button>
          </div>
        </div>
        <div id="searchResult"></div>
        <div id="friendList">
          ${friendRows && friendRows.length > 0 ? friendRows.map(row => {
            const f = row.sender_id === currentUser.id ? row.receiver : row.sender;
            return `
              <div class="friend-item">
                <div class="friend-info">
                  <div class="friend-avatar" style="background-image: url('${f.avatar_url || ''}');"></div>
                  <span class="friend-name">${escHtml(f.username)}</span>
                </div>
                <div>
                  <button class="btn btn-primary btn-sm chat-friend-btn" data-friend-id="${f.id}">💬 聊天</button>
                  <button class="btn btn-danger btn-sm remove-friend-btn" data-friend-id="${f.id}">移除</button>
                </div>
              </div>
            `;
          }).join('') : '<p style="color:#86909c;">暂无好友</p>'}
        </div>
        <hr style="margin:16px 0; border-color:#e5e6eb;">
        <div><strong>📩 好友请求</strong></div>
        ${pending && pending.length > 0 ? pending.map(row => `
          <div class="friend-item">
            <span>${escHtml(row.sender.username)} 想加你为好友</span>
            <div>
              <button class="btn btn-success btn-sm" data-request-id="${row.id}" data-action="accept">接受</button>
              <button class="btn btn-danger btn-sm" data-request-id="${row.id}" data-action="reject">拒绝</button>
            </div>
          </div>
        `).join('') : '<p style="color:#86909c;">没有新的好友请求</p>'}
      `;
      panelFriends.innerHTML = html;

      document.getElementById('searchFriendBtn').addEventListener('click', async () => {
        const keyword = document.getElementById('searchFriendInput').value.trim();
        if (!keyword) { document.getElementById('searchResult').innerHTML = ''; return; }
        const { data: users } = await supabase.from('users').select('id, username, avatar_url')
          .ilike('username', `%${keyword}%`).neq('id', currentUser.id);
        const resultDiv = document.getElementById('searchResult');
        if (!users || users.length === 0) {
          resultDiv.innerHTML = '<p style="color:#86909c;">未找到</p>';
          return;
        }
        const friendIds = friendRows ? friendRows.map(r => r.sender_id === currentUser.id ? r.receiver_id : r.sender_id) :
          [];
        resultDiv.innerHTML = users.map(u => {
          const isFriend = friendIds.includes(u.id);
          return `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #f2f3f5;">
              <span>${escHtml(u.username)}</span>
              ${isFriend ? '<span style="color:#86909c;">已是好友</span>' : `<button class="btn btn-primary btn-sm add-friend-btn" data-user-id="${u.id}">加好友</button>`}
            </div>
          `;
        }).join('');
        document.querySelectorAll('.add-friend-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const receiverId = parseInt(btn.dataset.userId);
            await supabase.from('friends').insert([{ sender_id: currentUser.id, receiver_id: receiverId,
              status: 'pending' }]);
            toast('好友请求已发送', 'success');
            renderFriends();
          });
        });
      });

      document.querySelectorAll('[data-request-id]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = parseInt(btn.dataset.requestId);
          const status = btn.dataset.action === 'accept' ? 'accepted' : 'rejected';
          await supabase.from('friends').update({ status }).eq('id', id);
          toast(btn.dataset.action === 'accept' ? '已接受' : '已拒绝', 'success');
          renderFriends();
          updateUI();
        });
      });

      document.querySelectorAll('.remove-friend-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const friendId = parseInt(btn.dataset.friendId);
          if (!confirm('确定移除该好友吗？')) return;
          await supabase.from('friends').delete()
            .or(`(sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id})`)
            .or(`(sender_id.eq.${friendId},receiver_id.eq.${friendId})`).eq('status', 'accepted');
          toast('已移除', 'success');
          renderFriends();
          updateUI();
        });
      });

      document.querySelectorAll('.chat-friend-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          chatWithFriendId = parseInt(btn.dataset.friendId);
          bottomTabs.forEach(t => t.classList.remove('active'));
          document.querySelector('.tab-item[data-tab="chat"]').classList.add('active');
          currentTab = 'chat';
          homeCover.style.display = 'none';
          homeStats.style.display = 'none';
          renderCurrentTab();
        });
      });
    }

    // ============================================================
    // 聊天
    // ============================================================
    async function renderChat() {
      if (!currentUser) {
        panelChat.innerHTML = '<div style="text-align:center;padding:30px;color:#86909c;">请先登录</div>';
        return;
      }
      const { data: friendRows } = await supabase.from('friends')
        .select('*, sender:users!friends_sender_id_fkey (id, username, avatar_url), receiver:users!friends_receiver_id_fkey (id, username, avatar_url)')
        .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`).eq('status', 'accepted');
      const friends = friendRows ? friendRows.map(row => row.sender_id === currentUser.id ? row.receiver : row.sender) :
        [];

      let html = `
        <div style="display:flex; gap:12px; flex-wrap:wrap; height:400px; background:#fff; border-radius:16px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.04);">
          <div style="width:120px; border-right:1px solid #e5e6eb; overflow-y:auto; padding:8px; flex-shrink:0;">
            <strong style="display:block; margin-bottom:8px;">好友</strong>
            ${friends.length === 0 ? '<p style="color:#86909c;font-size:13px;">暂无好友</p>' : ''}
            ${friends.map(f => `
              <div class="friend-item" style="padding:6px 4px; cursor:pointer; border-radius:8px;" data-friend-id="${f.id}">
                <div style="display:flex; align-items:center; gap:6px;">
                  <div class="friend-avatar" style="width:28px;height:28px;border-radius:50%;background-size:cover;background-position:center;background-image:url('${f.avatar_url || ''}');"></div>
                  <span style="font-size:13px;">${escHtml(f.username)}</span>
                  ${chatWithFriendId === f.id ? ' <span style="color:#ff8200;">✓</span>' : ''}
                </div>
              </div>
            `).join('')}
          </div>
          <div style="flex:1; display:flex; flex-direction:column; padding:8px; min-width:200px;">
            ${chatWithFriendId ? `
              <div style="font-weight:500; margin-bottom:8px;">与 ${escHtml(friends.find(f => f.id === chatWithFriendId)?.username || '好友')} 聊天</div>
              <div id="chatMessages" style="flex:1; overflow-y:auto; background:#f7f8fa; border-radius:12px; padding:10px; margin-bottom:8px;">
                <div style="text-align:center;color:#86909c;">加载中...</div>
              </div>
              <div style="display:flex; gap:8px;">
                <input type="text" id="chatInput" placeholder="输入消息..." style="flex:1; padding:8px 12px; border:1px solid #e5e6eb; border-radius:20px; outline:none;">
                <button class="btn btn-primary" id="sendChatBtn">发送</button>
              </div>
            ` : `<div style="flex:1; display:flex; align-items:center; justify-content:center; color:#86909c;">请选择好友开始聊天</div>`}
          </div>
        </div>
      `;
      panelChat.innerHTML = html;

      document.querySelectorAll('.friend-item[data-friend-id]').forEach(el => {
        el.addEventListener('click', () => {
          chatWithFriendId = parseInt(el.dataset.friendId);
          renderChat();
          setTimeout(() => {
            const container = document.getElementById('chatMessages');
            if (container) container.scrollTop = container.scrollHeight;
          }, 100);
        });
      });

      if (chatWithFriendId) {
        await loadMessages(chatWithFriendId);
        const container = document.getElementById('chatMessages');
        if (container) container.scrollTop = container.scrollHeight;
        document.getElementById('sendChatBtn').addEventListener('click', () => sendMessage(chatWithFriendId));
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
          if (e.key === 'Enter') sendMessage(chatWithFriendId);
        });
      }
    }

    async function loadMessages(friendId) {
      const container = document.getElementById('chatMessages');
      if (!container) return;
      const { data: messages, error } = await supabase.from('messages').select('*')
        .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${friendId}),and(sender_id.eq.${friendId},receiver_id.eq.${currentUser.id})`)
        .order('created_at', { ascending: true });
      if (error) {
        container.innerHTML = '<p style="color:#f53f3f;">加载失败</p>';
        return;
      }
      if (!messages || messages.length === 0) {
        container.innerHTML = '<div style="text-align:center;color:#86909c;">还没有消息</div>';
        return;
      }
      container.innerHTML = messages.map(msg => {
        const isSent = msg.sender_id === currentUser.id;
        return `
          <div style="padding:6px 12px; border-radius:16px; margin-bottom:4px; max-width:75%; ${isSent ? 'background:#ff8200; color:#fff; align-self:flex-end; margin-left:auto;' : 'background:#fff; border:1px solid #e5e6eb; align-self:flex-start;'}">
            <div>${escHtml(msg.content)}</div>
            <div style="font-size:10px; color:${isSent ? 'rgba(255,255,255,0.7)' : '#86909c'}; text-align:right; margin-top:2px;">${timeAgo(msg.created_at)}</div>
          </div>
        `;
      }).join('');
      await supabase.from('messages').update({ is_read: true }).eq('sender_id', friendId)
        .eq('receiver_id', currentUser.id).eq('is_read', false);
    }

    async function sendMessage(friendId) {
      const input = document.getElementById('chatInput');
      if (!input) return;
      const content = input.value.trim();
      if (!content) return;
      input.value = '';
      const { error } = await supabase.from('messages').insert([{
        sender_id: currentUser.id,
        receiver_id: friendId,
        content
      }]);
      if (error) { toast('发送失败: ' + error.message, 'error'); return; }
      const container = document.getElementById('chatMessages');
      if (container) {
        const div = document.createElement('div');
        div.style.cssText =
          'padding:6px 12px; border-radius:16px; margin-bottom:4px; max-width:75%; background:#ff8200; color:#fff; align-self:flex-end; margin-left:auto;';
        div.innerHTML = `<div>${escHtml(content)}</div><div style="font-size:10px; color:rgba(255,255,255,0.7); text-align:right; margin-top:2px;">刚刚</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
      }
    }

    function startChatSubscription() {
      if (chatSubscription) supabase.removeChannel(chatSubscription);
      if (!currentUser) return;
      chatSubscription = supabase.channel('messages-channel')
        .on('postgres_changes', {
          event: 'INSERT',
          schema: 'public',
          table: 'messages',
          filter: `receiver_id=eq.${currentUser.id}`
        }, (payload) => {
          const newMsg = payload.new;
          if (chatWithFriendId === newMsg.sender_id) {
            const container = document.getElementById('chatMessages');
            if (container) {
              if (container.children.length === 1 && container.children[0].tagName === 'DIV' && container
                .children[0].style?.textAlign === 'center') container.innerHTML = '';
              const div = document.createElement('div');
              div.style.cssText =
                'padding:6px 12px; border-radius:16px; margin-bottom:4px; max-width:75%; background:#fff; border:1px solid #e5e6eb; align-self:flex-start;';
              div.innerHTML =
                `<div>${escHtml(newMsg.content)}</div><div style="font-size:10px; color:#86909c; text-align:right; margin-top:2px;">刚刚</div>`;
              container.appendChild(div);
              container.scrollTop = container.scrollHeight;
            }
            supabase.from('messages').update({ is_read: true }).eq('id', newMsg.id);
          }
        }).subscribe();
    }

    // ============================================================
    // 登出
    // ============================================================
    // 在顶部头像添加登出功能（点击头像可退出）
    headerAvatar.addEventListener('click', () => {
      if (currentUser) {
        if (confirm('确定要退出登录吗？')) {
          if (chatSubscription) supabase.removeChannel(chatSubscription);
          currentUser = null;
          loginOverlay.classList.remove('hidden');
          appContainer.style.display = 'none';
          loginError.textContent = '';
          loginUsername.value = '';
          loginPassword.value = '';
          loginTabs.forEach(t => t.classList.remove('active'));
          document.querySelector('.login-tab[data-mode="login"]').classList.add('active');
          loginMode = 'login';
          toast('已离开会馆');
        }
      }
    });

    // ============================================================
    // 初始化
    // ============================================================
    function init() {
      loginOverlay.classList.remove('hidden');
      appContainer.style.display = 'none';
    }
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });
    init();

    // 搜索功能（简单过滤帖子标题）
    searchInput.addEventListener('input', (e) => {
      const keyword = e.target.value.trim().toLowerCase();
      const items = document.querySelectorAll('.post-item');
      items.forEach(item => {
        const title = item.querySelector('.post-title')?.textContent?.toLowerCase() || '';
        if (title.includes(keyword)) {
          item.style.display = '';
        } else {
          item.style.display = 'none';
        }
      });
    });

    window.supabase = supabase;
    window.currentUser = currentUser;
    console.log('🌲 雾凇会馆（微博移动版）已加载');
  </script>
</body>
</html>
