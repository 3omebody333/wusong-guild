<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌲 雾凇会馆 · 妖精公会</title>
    <style>
        /* ================================================================
           QQ空间风格 · 蓝白清新 · 圆润卡片 · 雾凇会馆专用
           ================================================================ */

        /* ----- 标签公用默认样式 ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body,
        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            margin: 0;
            padding: 0;
            font-family: punctuation, "PingFangSC-Regular", "Microsoft Yahei", "sans-serif";
        }

        html,
        body {
            height: 100%;
            background: #eef2f7;
            color: #2d3e50;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-size: 12px;
        }

        ul {
            list-style: none;
        }

        strong {
            font-size: 28px;
        }

        a:link,
        a:visited,
        a:active {
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
            cursor: pointer;
        }

        .clear {
            -ms-zoom: 1;
        }
        .clear:after {
            content: '';
            display: block;
            clear: both;
        }

        /* ===== 登录遮罩（QQ空间毛玻璃风格） ===== */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #e8f0fe 0%, #d4e4f7 100%);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #2d3e50;
        }
        .login-overlay.hidden {
            display: none;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px 36px;
            width: 380px;
            max-width: 92%;
            box-shadow: 0 20px 60px rgba(72, 110, 172, 0.20);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: transform 0.25s ease;
        }
        .login-card:hover {
            transform: translateY(-2px);
        }

        .login-cat {
            font-size: 3.2rem;
            margin-bottom: 2px;
        }
        .login-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1f3a5f;
            letter-spacing: 2px;
        }
        .login-sub {
            font-size: 0.8rem;
            color: #7a8fa6;
            margin: 6px 0 20px;
            letter-spacing: 4px;
        }

        .login-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
            background: #f0f5fa;
            border-radius: 40px;
            padding: 4px;
        }
        .login-tab {
            flex: 1;
            padding: 10px 0;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            background: transparent;
            border: none;
            transition: 0.25s ease;
            color: #7a8fa6;
        }
        .login-tab.active {
            background: #ffffff;
            color: #1f3a5f;
            box-shadow: 0 4px 12px rgba(72, 110, 172, 0.12);
            font-weight: 600;
        }

        .login-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e6edf4;
            border-radius: 40px;
            font-size: 0.95rem;
            margin-bottom: 14px;
            background: #ffffff;
            outline: none;
            transition: 0.2s ease;
            color: #1f3a5f;
        }
        .login-input:focus {
            border-color: #7bb3e0;
            box-shadow: 0 0 0 4px rgba(107, 172, 230, 0.15);
        }
        .login-input::placeholder {
            color: #b8c9da;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(145deg, #5b8ec9, #3f72af);
            color: #fff;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.25s ease;
            box-shadow: 0 6px 20px rgba(63, 114, 175, 0.30);
            letter-spacing: 2px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(63, 114, 175, 0.35);
        }
        .login-btn:active {
            transform: scale(0.98);
        }

        .login-error {
            color: #e4676a;
            font-size: 0.8rem;
            margin-top: 10px;
            min-height: 1.4em;
        }

        /* ===== 主布局 ===== */
        .app-container {
            display: flex;
            min-height: 100vh;
            background: #eef2f7;
        }

        /* ===== 左侧面板（QQ空间风格 — 毛玻璃） ===== */
        .left-panel {
            width: 250px;
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid rgba(255, 255, 255, 0.6);
            padding: 28px 18px 24px;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 2px 0 20px rgba(72, 110, 172, 0.06);
        }

        .left-panel .avatar-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 14px;
            background: #e6edf4;
            border: 4px solid #ffffff;
            box-shadow: 0 6px 24px rgba(72, 110, 172, 0.18);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.6rem;
            transition: 0.25s ease;
        }
        .left-panel .avatar-wrapper:hover {
            box-shadow: 0 8px 32px rgba(72, 110, 172, 0.28);
            transform: scale(1.02);
        }
        .left-panel .avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .left-panel .username {
            font-size: 1.15rem;
            font-weight: 700;
            color: #1f3a5f;
            margin-bottom: 2px;
        }
        .left-panel .level-info {
            font-size: 0.8rem;
            color: #7a8fa6;
            margin-bottom: 10px;
            background: rgba(236, 243, 251, 0.6);
            padding: 4px 16px;
            border-radius: 20px;
        }

        .left-panel .bio {
            font-size: 0.85rem;
            color: #4a637a;
            text-align: center;
            margin-bottom: 14px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 16px;
            width: 100%;
            word-break: break-word;
            cursor: pointer;
            transition: 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        .left-panel .bio:hover {
            background: #ffffff;
            box-shadow: 0 4px 12px rgba(72, 110, 172, 0.08);
        }

        .left-panel .stats {
            width: 100%;
            font-size: 0.8rem;
            color: #4a637a;
            border-top: 1px solid rgba(201, 218, 235, 0.5);
            padding-top: 14px;
            margin-top: 8px;
        }
        .left-panel .stats div {
            display: flex;
            justify-content: space-between;
            padding: 5px 4px;
            border-radius: 8px;
            transition: 0.15s ease;
        }
        .left-panel .stats div:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .left-panel .logout-btn {
            margin-top: auto;
            width: 100%;
            padding: 12px;
            background: rgba(228, 103, 106, 0.12);
            color: #d15b5e;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.25s ease;
            backdrop-filter: blur(4px);
        }
        .left-panel .logout-btn:hover {
            background: rgba(228, 103, 106, 0.22);
        }
        #avatarInput {
            display: none;
        }

        /* ===== 右侧主内容 ===== */
        .right-content {
            flex: 1;
            padding: 24px 28px 80px;
            max-width: calc(100% - 250px);
        }

        /* ===== 导航标签（QQ空间风格） ===== */
        .nav-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 6px 8px;
            margin-bottom: 28px;
            box-shadow: 0 4px 20px rgba(72, 110, 172, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.5);
            flex-wrap: wrap;
        }
        .nav-tab {
            padding: 10px 22px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: #4a637a;
            border-radius: 40px;
            transition: 0.25s ease;
            user-select: none;
            position: relative;
            border: none;
            background: transparent;
        }
        .nav-tab:hover {
            background: rgba(255, 255, 255, 0.5);
            color: #1f3a5f;
        }
        .nav-tab.active {
            background: #ffffff;
            color: #1f3a5f;
            box-shadow: 0 4px 16px rgba(72, 110, 172, 0.12);
            font-weight: 600;
        }
        .nav-tab .badge {
            position: absolute;
            top: 4px;
            right: 4px;
            background: #e4676a;
            color: #fff;
            border-radius: 50%;
            padding: 1px 7px;
            font-size: 0.6rem;
            min-width: 20px;
            text-align: center;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(228, 103, 106, 0.3);
        }

        /* ===== 面板容器 ===== */
        .panel {
            display: none;
        }
        .panel.active {
            display: block;
            animation: fadeUp 0.3s ease;
        }
        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== 卡片（QQ空间经典圆润白卡） ===== */
        .card {
            background: #ffffff;
            border-radius: 20px;
            padding: 22px 24px;
            margin-bottom: 20px;
            border: none;
            box-shadow: 0 4px 20px rgba(72, 110, 172, 0.07);
            transition: 0.25s ease;
        }
        .card:hover {
            box-shadow: 0 8px 32px rgba(72, 110, 172, 0.10);
        }

        .card-header {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f0f5fa;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #1f3a5f;
        }

        /* ===== 帖子列表 ===== */
        .post-item {
            padding: 14px 0;
            border-bottom: 1px solid #f0f5fa;
            cursor: pointer;
            display: flex;
            gap: 14px;
            transition: 0.15s ease;
            border-radius: 12px;
            padding-left: 8px;
            padding-right: 8px;
        }
        .post-item:hover {
            background: #f7faff;
        }
        .post-item:last-child {
            border-bottom: none;
        }

        .post-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #e6edf4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(72, 110, 172, 0.06);
        }
        .post-title {
            font-weight: 600;
            color: #1f3a5f;
        }
        .post-meta {
            font-size: 0.75rem;
            color: #8aa3b9;
            margin-top: 4px;
        }

        /* ===== 好友/聊天列表 ===== */
        .friend-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 8px;
            border-bottom: 1px solid #f0f5fa;
            cursor: pointer;
            border-radius: 12px;
            transition: 0.15s ease;
        }
        .friend-item:hover {
            background: #f7faff;
        }

        /* ===== 聊天窗口 ===== */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #f7faff;
            border-radius: 16px;
            margin-bottom: 12px;
            border: none;
            min-height: 300px;
        }
        .chat-message {
            margin-bottom: 10px;
            padding: 10px 16px;
            border-radius: 18px;
            max-width: 78%;
            word-wrap: break-word;
            box-shadow: 0 2px 8px rgba(72, 110, 172, 0.04);
        }
        .chat-message.sent {
            background: linear-gradient(145deg, #5b8ec9, #3f72af);
            color: #fff;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        .chat-message.received {
            background: #ffffff;
            border: 1px solid #e6edf4;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .chat-message .time {
            font-size: 0.6rem;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
        }
        .chat-input-area {
            display: flex;
            gap: 10px;
            background: #f7faff;
            padding: 8px 8px 8px 16px;
            border-radius: 40px;
            border: 1px solid #e6edf4;
        }
        .chat-input-area input {
            flex: 1;
            padding: 10px 4px;
            border: none;
            background: transparent;
            outline: none;
            font-size: 0.9rem;
            color: #1f3a5f;
        }

        /* ===== 按钮 ===== */
        .btn {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            border: none;
            font-size: 0.8rem;
            font-weight: 500;
            transition: 0.25s ease;
            background: #f0f5fa;
            color: #4a637a;
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(72, 110, 172, 0.12);
        }
        .btn-primary {
            background: linear-gradient(145deg, #5b8ec9, #3f72af);
            color: #fff;
            box-shadow: 0 4px 16px rgba(63, 114, 175, 0.25);
        }
        .btn-primary:hover {
            box-shadow: 0 6px 24px rgba(63, 114, 175, 0.32);
        }
        .btn-outline {
            background: transparent;
            color: #3f72af;
            border: 2px solid #d0e1f0;
        }
        .btn-outline:hover {
            background: #f0f5fa;
            border-color: #3f72af;
        }
        .btn-sm {
            padding: 5px 14px;
            font-size: 0.75rem;
        }
        .btn-danger {
            background: rgba(228, 103, 106, 0.12);
            color: #d15b5e;
        }
        .btn-danger:hover {
            background: rgba(228, 103, 106, 0.22);
        }
        .btn-success {
            background: linear-gradient(145deg, #6bc0a5, #4ea389);
            color: #fff;
            box-shadow: 0 4px 16px rgba(78, 163, 137, 0.25);
        }
        .btn-success:hover {
            box-shadow: 0 6px 24px rgba(78, 163, 137, 0.32);
        }

        /* ===== 基建网格 ===== */
        .map-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 16px;
        }
        .build-card {
            background: #f7faff;
            border-radius: 18px;
            padding: 18px 12px;
            text-align: center;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.25s ease;
        }
        .build-card:hover {
            border-color: #d0e1f0;
            box-shadow: 0 4px 16px rgba(72, 110, 172, 0.06);
            transform: translateY(-3px);
        }
        .build-card .icon {
            font-size: 2.6rem;
            margin-bottom: 6px;
        }

        /* ===== 任务进度 ===== */
        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f5fa;
        }
        .task-progress {
            flex: 1;
            margin: 0 14px;
            height: 8px;
            background: #e6edf4;
            border-radius: 4px;
            overflow: hidden;
        }
        .task-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #5b8ec9, #6bc0a5);
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 4px;
        }

        /* ===== 模态框（QQ空间风格） ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(35, 55, 80, 0.40);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 28px 30px;
            width: 92%;
            max-width: 460px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 24px 60px rgba(35, 55, 80, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: fadeUp 0.25s ease;
        }
        .modal h3 {
            color: #1f3a5f;
            font-weight: 600;
            margin-bottom: 18px;
        }
        .modal input,
        .modal textarea,
        .modal select {
            width: 100%;
            border: 2px solid #e6edf4;
            border-radius: 16px;
            padding: 12px 16px;
            font-size: 0.9rem;
            margin-bottom: 12px;
            font-family: inherit;
            background: #ffffff;
            transition: 0.2s ease;
            color: #1f3a5f;
        }
        .modal input:focus,
        .modal textarea:focus,
        .modal select:focus {
            border-color: #7bb3e0;
            box-shadow: 0 0 0 4px rgba(107, 172, 230, 0.12);
            outline: none;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 16px;
        }

        /* ===== Toast ===== */
        .toast-container {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 300;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .toast {
            background: rgba(31, 58, 95, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 0.85rem;
            box-shadow: 0 8px 28px rgba(31, 58, 95, 0.20);
            animation: fadeUp 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .toast.success {
            background: rgba(78, 163, 137, 0.90);
        }
        .toast.error {
            background: rgba(228, 103, 106, 0.90);
        }

        /* ===== 滚动条美化（QQ空间风格） ===== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #c8d8e8;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #b0c6da;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }
            .left-panel {
                width: 100%;
                height: auto;
                position: static;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                padding: 16px;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.3);
                backdrop-filter: blur(12px);
                gap: 6px 16px;
            }
            .left-panel .avatar-wrapper {
                width: 72px;
                height: 72px;
                font-size: 2.4rem;
            }
            .left-panel .bio {
                width: 100%;
                order: 10;
            }
            .left-panel .logout-btn {
                margin-top: 0;
                order: 20;
                width: auto;
                padding: 8px 24px;
            }
            .left-panel .stats {
                width: auto;
                border-top: none;
                padding-top: 0;
                margin-top: 0;
                display: flex;
                gap: 16px;
            }
            .left-panel .stats div {
                padding: 2px 0;
            }
            .right-content {
                max-width: 100%;
                padding: 16px;
            }
            .nav-tabs {
                border-radius: 30px;
                padding: 4px 6px;
            }
            .nav-tab {
                padding: 6px 14px;
                font-size: 0.8rem;
            }
            .login-card {
                padding: 28px 20px;
            }
            .modal {
                padding: 20px 18px;
            }
            .map-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
        }
    </style>
</head>
<body>

    <!-- ===== 登录遮罩 ===== -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <div class="login-cat">🐱</div>
            <div class="login-title">雾凇会馆</div>
            <div class="login-sub">—— 东北吉林 · 妖精公会 ——</div>
            <div class="login-tabs">
                <div class="login-tab active" data-mode="login">登录</div>
                <div class="login-tab" data-mode="register">注册</div>
            </div>
            <input type="text" class="login-input" id="loginUsername" placeholder="妖精名号" maxlength="12">
            <input type="password" class="login-input" id="loginPassword" placeholder="密码">
            <div class="login-error" id="loginError"></div>
            <button class="login-btn" id="loginBtn">进入会馆</button>
        </div>
    </div>

    <!-- ===== 主应用 ===== -->
    <div class="app-container" id="appContainer" style="display:none;">
        <!-- 左侧个人面板 -->
        <div class="left-panel" id="leftPanel">
            <div class="avatar-wrapper" id="avatarWrapper">
                <img id="avatarImg" src="" alt="头像">

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ================================================================

        function toast(msg, type = '') {
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.textContent = msg;
            toastContainer.appendChild(el);
            setTimeout(() => el.remove(), 2500);
        }

        function escHtml(str) {
            if (!str) return '';
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function timeAgo(ts) {
            if (!ts) return '未知';
            const diff = Date.now() - new Date(ts).getTime();
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            if (diff < 2592000000) return Math.floor(diff / 86400000) + '天前';
            return new Date(ts).toLocaleDateString();
        }

        function closeModal() {
            modalOverlay.classList.remove('show');
            modalContent.innerHTML = '';
        }

        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password + 'fog-salt-2026');
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function isNewDay(lastDate) {
            if (!lastDate) return true;
            const today = new Date().toDateString();
            return new Date(lastDate).toDateString() !== today;
        }

        // ================================================================

        loginBtn.addEventListener('click', async () => {
            const username = loginUsername.value.trim();
            const password = loginPassword.value;
            if (!username || !password) {
                loginError.textContent = '请填写完整';
                return;
            }
            loginError.textContent = '';

            try {
                if (loginMode === 'register') {
                    const { data: existing } = await supabase
                        .from('users')
                        .select('id')
                        .eq('username', username)
                        .maybeSingle();
                    if (existing) {
                        loginError.textContent = '用户名已被占用';
                        return;
                    }
                    const passwordHash = await hashPassword(password);
                    const { error: insertError } = await supabase
                        .from('users')
                        .insert([{ username, password_hash: passwordHash }]);
                    if (insertError) throw insertError;
                    toast('注册成功！请登录', 'success');
                    loginTabs.forEach(t => t.classList.remove('active'));
                    document.querySelector('.login-tab[data-mode="login"]').classList.add('active');
                    loginMode = 'login';
                    loginPassword.value = '';
                    loginUsername.value = '';
                } else {
                    const { data: user, error: userError } = await supabase
                        .from('users')
                        .select('*')
                        .eq('username', username)
                        .maybeSingle();
                    if (userError || !user) {
                        loginError.textContent = '用户名不存在';
                        return;
                    }
                    const inputHash = await hashPassword(password);
                    if (inputHash !== user.password_hash) {
                        loginError.textContent = '密码错误';
                        return;
                    }
                    currentUser = user;
                    loginOverlay.classList.add('hidden');
                    appContainer.style.display = 'flex';
                    await resetDailyTasksIfNeeded();
                    updateLeftPanel();
                    renderCurrentTab();
                    startChatSubscription();
                    updateUnreadCount();

            }
        });

        // ================================================================

        async function resetDailyTasksIfNeeded() {
            if (!currentUser) return;
            const tasks = currentUser.daily_tasks || {};

            if (isNewDay(lastReset)) {
                const newTasks = {
                    signed: false,
                    posted: false,
                    replied: false,
                    built: false,
                    last_reset: new Date().toISOString()
                };
                const { error } = await supabase
                    .from('users')
                    .update({ daily_tasks: newTasks })
                    .eq('id', currentUser.id);
                if (!error) currentUser.daily_tasks = newTasks;
            }
        }

        // ================================================================

            if (!currentUser) return;

            panelBio.textContent = currentUser.bio || '这个人很懒，什么都没写~';

                avatarImg.style.display = 'block';
                avatarEmoji.style.display = 'none';
            } else {
                avatarImg.style.display = 'none';
                avatarEmoji.style.display = 'block';

        async function updateFriendCount() {
            if (!currentUser) return;
            const { count } = await supabase

                .eq('status', 'accepted');
            panelFriendCount.textContent = count || 0;
        }

            if (!currentUser) return;
            const { count } = await supabase
                .from('posts')
                .select('*', { count: 'exact', head: true })
                .eq('author_id', currentUser.id);
            panelPostCount.textContent = count || 0;
        }

        // ================================================================
        // 7. 头像上传
        // ================================================================
        avatarWrapper.addEventListener('click', () => avatarInput.click());
        avatarInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const allowedTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
            if (!allowedTypes.includes(file.type)) {
                toast('只支持 JPG, PNG, GIF, WebP 格式', 'error');
                avatarInput.value = '';
                return;
            }
            if (file.size > 2 * 1024 * 1024) {
                toast('图片不能超过 2MB', 'error');
                avatarInput.value = '';
                return;
            }
            const fileExt = file.name.split('.').pop();
            const fileName = `${currentUser.id}_${Date.now()}.${fileExt}`;
            const { error } = await supabase.storage.from('avatars').upload(fileName, file);
            if (error) {
                toast('上传失败: ' + error.message, 'error');
                console.error('Upload error:', error);
                avatarInput.value = '';
                return;
            }
            const { data: urlData } = supabase.storage.from('avatars').getPublicUrl(fileName);
            const avatarUrl = urlData.publicUrl;
            const { error: updateError } = await supabase
                .from('users')
                .update({ avatar_url: avatarUrl })
                .eq('id', currentUser.id);

        // ================================================================
        // 10. 论坛（含板块）
        // ================================================================
        async function renderForum() {
            if (viewingPostId) {
                await renderPostDetail(viewingPostId);
                return;
            }
            const { data: boards } = await supabase.from('boards').select('*').order('sort_order');
            let boardNav =
                `<div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;">`;

            }
            boardNav += `</div>`;

            panelForum.innerHTML = `

                const postIds = posts.map(p => p.id);
                const { data: stats } = await supabase.from('posts_stats').select('*').in('id', postIds);
                const statMap = {};
                if (stats) stats.forEach(s => { statMap[s.id] = s; });
                let html = '';
                for (const post of posts) {
                    const replyCount = statMap[post.id]?.reply_count || 0;
                    const likeCount = statMap[post.id]?.like_count || 0;
                    const isHot = replyCount >= 5;
                    html += `
                        <div class="post-item" data-postid="${post.id}">
                            <div class="post-avatar">${escHtml(post.avatar || '🐱')}</div>
                            <div style="flex:1;">
                                <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
                                    <span class="post-title">${escHtml(post.title)} ${isHot ? '🔥' : ''}</span>
                                    ${post.board_name ? `<span style="font-size:0.6rem; background:#eef2f7; padding:2px 10px; border-radius:20px; color:#4a637a;">${escHtml(post.board_name)}</span>` : ''}
                                </div>
                                <div style="font-size:0.85rem;color:#4a637a;margin:4px 0;">${escHtml(post.content.substring(0, 60))}${post.content.length>60?'...':''}</div>
                                <div class="post-meta">
                                    ${escHtml(post.username || '已注销')} · ${timeAgo(post.created_at)} · 
                                    ❤️ ${likeCount} · 💬 ${replyCount}
                                    ${post.updated_at && post.updated_at !== post.created_at ? ' ✏️已编辑' : ''}
                                </div>
                            </div>
                        </div>
                    `;
                }
                document.getElementById('postsList').innerHTML = html;
                document.querySelectorAll('.post-item').forEach(el => {
                    el.addEventListener('click', () => {
                        viewingPostId = parseInt(el.dataset.postid);
                        renderForum();
                    });
                });
            }
        }

            if (!currentUser) { toast('请先登录', 'error'); return; }
            supabase.from('boards').select('*').order('sort_order').then(({ data: boards }) => {
                const boardOptions = boards.map(b => `<option value="${b.id}">${escHtml(b.name)}</option>`).join('');

                    </div>

                    const boardId = parseInt(document.getElementById('newPostBoard').value);

                    await completeDailyTask('posted');

                    closeModal();
                    viewingPostId = null;
                    renderForum();
                    updateLeftPanel();
                });
            }).catch(err => toast('加载板块失败', 'error'));
        }

        // ================================================================
        // 12. 帖子详情、回复、编辑、删除
        // ================================================================
        async function renderPostDetail(postId) {

                .from('likes')

                const { data: likeData } = await supabase
                    .from('likes')
                    .select('*')
                    .eq('post_id', postId)
                    .eq('user_id', currentUser.id)
                    .maybeSingle();
                userLiked = !!likeData;
            }

            const replyList = replies || [];
            const isAuthor = currentUser && currentUser.id === post.author_id;

            let html = `
                <div class="card">

                        <h2 style="font-size:1.2rem;color:#1f3a5f;">${escHtml(post.title)}</h2>

                            <button class="btn btn-primary btn-sm" id="replyBtn">💬 回复</button>

                                <button class="btn btn-primary btn-sm" id="editPostBtn">✏️ 编辑</button>

                                <div style="display:flex;align-items:center;gap:8px;">

        // ================================================================
        // 13. 任务委托系统
        // ================================================================
        async function renderTasksBoard() {
            if (!currentUser) {
                panelTasks.innerHTML = `<div class="card">请先登录</div>`;
                return;
            }
            const { data: tasks } = await supabase
                .from('tasks')
                .select(`
                    *,
                    publisher:users!publisher_id (username, avatar_url),
                    acceptor:users!accepted_by (username, avatar_url)
                `)
                .order('created_at', { ascending: false });

            let html = `
                <div class="card">
                    <div class="card-header">
                        <span>📋 任务委托</span>
                        <button class="btn btn-primary btn-sm" id="newTaskBtn">➕ 发布任务</button>
                    </div>
                    <div style="margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap;">
                        <button class="btn btn-outline btn-sm filter-task" data-filter="all">全部</button>
                        <button class="btn btn-outline btn-sm filter-task" data-filter="pending">待领取</button>
                        <button class="btn btn-outline btn-sm filter-task" data-filter="in_progress">进行中</button>
                        <button class="btn btn-outline btn-sm filter-task" data-filter="completed">已完成</button>
                        <button class="btn btn-outline btn-sm filter-task" data-filter="mine">我发布的</button>
                        <button class="btn btn-outline btn-sm filter-task" data-filter="accepted">我接受的</button>
                    </div>
                    <div id="taskList"></div>
                </div>
            `;
            panelTasks.innerHTML = html;

            document.getElementById('newTaskBtn').addEventListener('click', openNewTask);

            document.querySelectorAll('.filter-task').forEach(btn => {
                btn.addEventListener('click', () => {
                    const filter = btn.dataset.filter;
                    renderTaskList(tasks, filter);
                });
            });

            renderTaskList(tasks, 'all');

            function renderTaskList(allTasks, filter) {
                let filtered = allTasks || [];
                if (filter === 'pending') filtered = filtered.filter(t => t.status === 'pending');
                else if (filter === 'in_progress') filtered = filtered.filter(t => t.status === 'in_progress');
                else if (filter === 'completed') filtered = filtered.filter(t => t.status === 'completed');
                else if (filter === 'mine') filtered = filtered.filter(t => t.publisher_id === currentUser.id);
                else if (filter === 'accepted') filtered = filtered.filter(t => t.accepted_by === currentUser.id);

                const listDiv = document.getElementById('taskList');
                if (!filtered.length) {
                    listDiv.innerHTML = '<p style="color:#8aa3b9;">暂无任务</p>';
                    return;
                }
                let html = '';
                for (const task of filtered) {
                    const isPublisher = task.publisher_id === currentUser.id;
                    const isAcceptor = task.accepted_by === currentUser.id;
                    const canAccept = task.status === 'pending' && !isPublisher && !task.accepted_by;
                    const canComplete = task.status === 'in_progress' && isAcceptor;
                    const canConfirm = task.status === 'in_progress' && isPublisher;
                    html += `
                        <div style="border-bottom:1px solid #f0f5fa; padding:14px 0;">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <div>
                                    <strong style="color:#1f3a5f;">${escHtml(task.title)}</strong>
                                    <span style="font-size:0.7rem; background:${task.status==='pending'?'#f0e68c':task.status==='in_progress'?'#a8d5e5':'#b5d6b0'}; color:#2d3e50; padding:2px 12px; border-radius:20px;">
                                        ${task.status === 'pending' ? '待领取' : task.status === 'in_progress' ? '进行中' : '已完成'}
                                    </span>
                                </div>
                                <div style="color:#4ea389;font-weight:600;">🪙 ${task.reward_gold}</div>
                            </div>
                            <div style="font-size:0.85rem; color:#4a637a; margin:4px 0;">${escHtml(task.description || '')}</div>
                            <div style="font-size:0.75rem; color:#8aa3b9;">
                                发布者：${escHtml(task.publisher?.username || '已注销')} · ${timeAgo(task.created_at)}
                                ${task.acceptor ? ` · 领取者：${escHtml(task.acceptor.username)}` : ''}
                            </div>
                            <div style="margin-top:8px; display:flex; gap:6px; flex-wrap:wrap;">
                                ${canAccept ? `<button class="btn btn-success btn-sm accept-task" data-id="${task.id}">领取任务</button>` : ''}
                                ${canComplete ? `<button class="btn btn-primary btn-sm complete-task" data-id="${task.id}">申请完成</button>` : ''}
                                ${canConfirm ? `<button class="btn btn-success btn-sm confirm-task" data-id="${task.id}">确认完成并发放金币</button>` : ''}
                                ${isPublisher && task.status === 'pending' ? `<button class="btn btn-danger btn-sm delete-task" data-id="${task.id}">删除</button>` : ''}
                            </div>
                        </div>
                    `;
                }
                listDiv.innerHTML = html;

                listDiv.querySelectorAll('.accept-task').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const id = parseInt(btn.dataset.id);
                        const { error } = await supabase
                            .from('tasks')
                            .update({ status: 'in_progress', accepted_by: currentUser.id })
                            .eq('id', id);
                        if (error) { toast('领取失败: ' + error.message, 'error'); return; }
                        toast('任务领取成功！', 'success');
                        renderTasksBoard();
                    });
                });

                listDiv.querySelectorAll('.complete-task').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        toast('已通知发布者，等待确认', 'success');
                    });
                });

                listDiv.querySelectorAll('.confirm-task').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const id = parseInt(btn.dataset.id);
                        const { data: task } = await supabase
                            .from('tasks')
                            .select('reward_gold, accepted_by')
                            .eq('id', id)
                            .single();
                        if (!task || !task.accepted_by) {
                            toast('任务信息有误', 'error');
                            return;
                        }
                        const { data: acceptor } = await supabase
                            .from('users')
                            .select('gold')
                            .eq('id', task.accepted_by)
                            .single();
                        if (!acceptor) { toast('领取者不存在', 'error'); return; }
                        const newGold = acceptor.gold + task.reward_gold;
                        const { error: goldError } = await supabase
                            .from('users')
                            .update({ gold: newGold })
                            .eq('id', task.accepted_by);
                        if (goldError) {
                            toast('发放金币失败: ' + goldError.message, 'error');
                            return;
                        }
                        await supabase.from('tasks').update({ status: 'completed' }).eq('id', id);
                        toast('任务完成！金币已发放', 'success');
                        renderTasksBoard();
                        updateLeftPanel();
                    });
                });

                listDiv.querySelectorAll('.delete-task').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        if (!confirm('确定删除此任务吗？')) return;
                        await supabase.from('tasks').delete().eq('id', parseInt(btn.dataset.id));
                        toast('任务已删除', 'success');
                        renderTasksBoard();
                    });
                });
            }
        }

        function openNewTask() {
            if (!currentUser) { toast('请先登录', 'error'); return; }
            modalContent.innerHTML = `
                <h3>📝 发布新任务</h3>
                <input type="text" id="taskTitle" placeholder="任务标题" maxlength="100">
                <textarea id="taskDesc" rows="4" placeholder="任务描述"></textarea>
                <input type="number" id="taskReward" placeholder="奖励金币（正数）" min="1" value="10">
                <div class="modal-actions">
                    <button class="btn btn-outline btn-sm" id="modalCancel">取消</button>
                    <button class="btn btn-primary btn-sm" id="modalConfirm">发布</button>
                </div>
            `;
            modalOverlay.classList.add('show');
            document.getElementById('modalCancel').addEventListener('click', closeModal);
            document.getElementById('modalConfirm').addEventListener('click', async () => {
                const title = document.getElementById('taskTitle').value.trim();
                const description = document.getElementById('taskDesc').value.trim();
                const reward = parseInt(document.getElementById('taskReward').value);
                if (!title || !description) { toast('请填写完整', 'error'); return; }
                if (reward < 1) { toast('奖励必须大于0', 'error'); return; }
                if (reward > (currentUser.gold || 0)) {
                    toast('金币不足，无法发布', 'error');
                    return;
                }
                const newGold = currentUser.gold - reward;
                const { error: updateGold } = await supabase
                    .from('users')
                    .update({ gold: newGold })
                    .eq('id', currentUser.id);
                if (updateGold) { toast('金币扣除失败', 'error'); return; }
                currentUser.gold = newGold;
                const { error } = await supabase
                    .from('tasks')
                    .insert([{ title, description, reward_gold: reward, publisher_id: currentUser.id }]);
                if (error) { toast('发布任务失败: ' + error.message, 'error'); return; }
                toast('任务发布成功！', 'success');
                closeModal();
                renderTasksBoard();
                updateLeftPanel();
            });
        }

            document.getElementById('searchFriendBtn').addEventListener('click', async () => {
                const keyword = document.getElementById('searchFriendInput').value.trim();

                    .select('id, username, avatar_url')

                if (!users || users.length === 0) { resultDiv.innerHTML = '<p style="color:#8aa3b9;">未找到</p>'; return; }
                const friendIds = friendRows ? friendRows.map(r => r.sender_id === currentUser.id ? r.receiver_id : r.sender_id) : [];
                resultDiv.innerHTML = users.map(u => {

        async function loadMessages(friendId) {
            const container = document.getElementById('chatMessages');
            if (!container) return;
            const { data: messages, error } = await supabase
                .from('messages')
                .select('*')
                .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${friendId}),and(sender_id.eq.${friendId},receiver_id.eq.${currentUser.id})`)
                .order('created_at', { ascending: true });
            if (error) { container.innerHTML = '<p style="color:#e4676a;">加载失败</p>'; return; }
            if (!messages || messages.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:#8aa3b9;font-size:0.8rem;">还没有消息，打个招呼吧 👋</div>';
                return;
            }
            container.innerHTML = messages.map(msg => {
                const isSent = msg.sender_id === currentUser.id;
                return `
                    <div class="chat-message ${isSent ? 'sent' : 'received'}" style="max-width:78%; word-wrap:break-word; margin-bottom:10px; ${isSent ? 'border-bottom-right-radius:4px;' : 'border-bottom-left-radius:4px;'}">
                        <div>${escHtml(msg.content)}</div>
                        <div class="time" style="font-size:0.6rem;opacity:0.6;margin-top:4px;text-align:right;">${timeAgo(msg.created_at)}</div>
                    </div>
                `;
            }).join('');
            await supabase
                .from('messages')
                .update({ is_read: true })
                .eq('sender_id', friendId)
                .eq('receiver_id', currentUser.id)
                .eq('is_read', false);
            updateUnreadCount();
        }

        async function sendMessage(friendId) {
            const input = document.getElementById('chatInput');
            if (!input) return;
            const content = input.value.trim();
            if (!content) return;
            input.value = '';
            const { error } = await supabase
                .from('messages')
                .insert([{ sender_id: currentUser.id, receiver_id: friendId, content }]);
            if (error) { toast('发送失败: ' + error.message, 'error'); return; }
            const container = document.getElementById('chatMessages');
            if (container) {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'chat-message sent';
                msgDiv.style.maxWidth = '78%';
                msgDiv.style.wordWrap = 'break-word';
                msgDiv.style.marginBottom = '10px';
                msgDiv.style.borderBottomRightRadius = '4px';
                msgDiv.innerHTML =
                    `<div>${escHtml(content)}</div><div class="time" style="font-size:0.6rem;opacity:0.6;margin-top:4px;text-align:right;">刚刚</div>`;
                container.appendChild(msgDiv);
                container.scrollTop = container.scrollHeight;
            }
        }

        function startChatSubscription() {
            if (chatSubscription) supabase.removeChannel(chatSubscription);
            if (!currentUser) return;
            chatSubscription = supabase
                .channel('messages-channel')
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'messages',
                    filter: `receiver_id=eq.${currentUser.id}`
                }, (payload) => {
                    const newMsg = payload.new;
                    if (chatWithFriendId === newMsg.sender_id) {
                        const container = document.getElementById('chatMessages');
                        if (container) {
                            if (container.children.length === 1 && container.children[0].tagName === 'DIV' && container.children[0]
                                .style?.textAlign === 'center') {
                                container.innerHTML = '';
                            }
                            const msgDiv = document.createElement('div');
                            msgDiv.className = 'chat-message received';
                            msgDiv.style.maxWidth = '78%';
                            msgDiv.style.wordWrap = 'break-word';
                            msgDiv.style.marginBottom = '10px';
                            msgDiv.style.borderBottomLeftRadius = '4px';
                            msgDiv.innerHTML =
                                `<div>${escHtml(newMsg.content)}</div><div class="time" style="font-size:0.6rem;opacity:0.6;margin-top:4px;text-align:right;">刚刚</div>`;
                            container.appendChild(msgDiv);
                            container.scrollTop = container.scrollHeight;
                        }
                        supabase.from('messages').update({ is_read: true }).eq('id', newMsg.id);
                    }
                    updateUnreadCount();
                })
                .subscribe();
        }

        async function updateUnreadCount() {
            if (!currentUser) { chatBadge.style.display = 'none'; return; }
            const { count } = await supabase
                .from('messages')
                .select('*', { count: 'exact', head: true })
                .eq('receiver_id', currentUser.id)
                .eq('is_read', false);
            if (count && count > 0) {
                chatBadge.textContent = count > 99 ? '99+' : count;
                chatBadge.style.display = 'inline';
            } else {
                chatBadge.style.display = 'none';
            }
        }

        // ================================================================
        // 16. 基建中心
        // ================================================================
        async function renderBuild() {
            if (!currentUser) { panelBuild.innerHTML = `<div class="card">请先登录</div>`; return; }
            const buildings = currentUser.buildings || { farm: 0, house: 0, land: 0 };
            const gold = currentUser.gold || 0;

            panelBuild.innerHTML = `
                <div class="card">
                    <div class="card-header">🏗️ 基建中心</div>
                    <p style="color:#4a637a;">🪙 金币：<strong style="color:#1f3a5f;">${gold}</strong></p>
                    <div class="map-grid">
                        <div class="build-card" data-type="farm">
                            <div class="icon">🌾</div>
                            <div style="font-weight:500;color:#1f3a5f;">灵质农场</div>
                            <div style="color:#4a637a;">拥有：${buildings.farm || 0} 块</div>
                            <div style="font-size:0.7rem;color:#8aa3b9;">💰50 金币/块</div>
                            <button class="btn btn-primary btn-sm" style="margin-top:8px;">购买</button>
                        </div>
                        <div class="build-card" data-type="house">
                            <div class="icon">🏡</div>
                            <div style="font-weight:500;color:#1f3a5f;">妖精小屋</div>
                            <div style="color:#4a637a;">拥有：${buildings.house || 0} 间</div>
                            <div style="font-size:0.7rem;color:#8aa3b9;">💰200 金币/间</div>
                            <button class="btn btn-primary btn-sm" style="margin-top:8px;">购买</button>
                        </div>
                        <div class="build-card" data-type="land">
                            <div class="icon">🏔️</div>
                            <div style="font-weight:500;color:#1f3a5f;">山区领地</div>
                            <div style="color:#4a637a;">拥有：${buildings.land || 0} 处</div>
                            <div style="font-size:0.7rem;color:#8aa3b9;">💰500 金币/处</div>
                            <button class="btn btn-primary btn-sm" style="margin-top:8px;">购买</button>
                        </div>
                    </div>
                </div>
            `;

            document.querySelectorAll('.build-card').forEach(card => {
                card.querySelector('button').addEventListener('click', async () => {
                    const type = card.dataset.type;
                    const costs = { farm: 50, house: 200, land: 500 };
                    const cost = costs[type];
                    if ((currentUser.gold || 0) < cost) { toast('金币不足', 'error'); return; }
                    const newBuildings = { ...(currentUser.buildings || {}) };
                    newBuildings[type] = (newBuildings[type] || 0) + 1;
                    const newGold = (currentUser.gold || 0) - cost;
                    await supabase
                        .from('users')
                        .update({ gold: newGold, buildings: newBuildings })
                        .eq('id', currentUser.id);
                    currentUser.gold = newGold;
                    currentUser.buildings = newBuildings;
                    await completeDailyTask('built');
                    updateLeftPanel();
                    renderBuild();
                    toast('建设成功！', 'success');
                });
            });
        }

        // ================================================================
        // 17. 每日任务
        // ================================================================
        async function renderDaily() {
            if (!currentUser) { panelDaily.innerHTML = `<div class="card">请先登录</div>`; return; }
            const tasks = currentUser.daily_tasks || {};
            const signed = tasks.signed || false;
            const posted = tasks.posted || false;
            const replied = tasks.replied || false;
            const built = tasks.built || false;

            const total = 4;
            const done = [signed, posted, replied, built].filter(Boolean).length;
            const progress = Math.round((done / total) * 100);

            panelDaily.innerHTML = `
                <div class="card">
                    <div class="card-header">📌 每日任务</div>
                    <div style="margin-bottom:12px;">
                        <span style="color:#4a637a;">进度：${done}/${total}</span>
                        <div class="task-progress" style="margin-top:4px;">
                            <div class="task-progress-bar" style="width:${progress}%;"></div>
                        </div>
                    </div>
                    <div class="task-item">
                        <span style="color:#1f3a5f;">📌 签到</span>
                        <span>${signed ? '✅ 已完成' : '<button class="btn btn-primary btn-sm" id="taskSign">签到</button>'}</span>
                    </div>
                    <div class="task-item">
                        <span style="color:#1f3a5f;">📝 发帖（每日1帖）</span>
                        <span>${posted ? '✅ 已完成' : '⏳ 未完成'}</span>
                    </div>
                    <div class="task-item">
                        <span style="color:#1f3a5f;">💬 回复（每日1次）</span>
                        <span>${replied ? '✅ 已完成' : '⏳ 未完成'}</span>
                    </div>
                    <div class="task-item">
                        <span style="color:#1f3a5f;">🏗️ 基建（购买1次）</span>
                        <span>${built ? '✅ 已完成' : '⏳ 未完成'}</span>
                    </div>
                    <div style="margin-top:12px; text-align:right;">
                        <button class="btn btn-success" id="claimRewardBtn">🎁 领取奖励（${done === 4 ? '可领取' : '未完成'}）</button>
                    </div>
                </div>
            `;

            document.getElementById('taskSign')?.addEventListener('click', async () => {
                if (signed) { toast('今日已签到', 'error'); return; }
                await completeDailyTask('signed');
                toast('签到成功！获得20金币', 'success');
                renderDaily();
                updateLeftPanel();
            });

            document.getElementById('claimRewardBtn').addEventListener('click', async () => {
                if (done !== 4) { toast('请先完成所有任务', 'error'); return; }
                const newGold = (currentUser.gold || 0) + 50;
                const newExp = (currentUser.exp || 0) + 30;
                await supabase.from('users').update({ gold: newGold, exp: newExp }).eq('id', currentUser.id);
                currentUser.gold = newGold;
                currentUser.exp = newExp;
                toast('🎉 获得50金币和30经验！', 'success');
                const resetTasks = { signed: false, posted: false, replied: false, built: false, last_reset: new Date()
                        .toISOString() };
                await supabase.from('users').update({ daily_tasks: resetTasks }).eq('id', currentUser.id);
                currentUser.daily_tasks = resetTasks;
                updateLeftPanel();
                renderDaily();
            });
        }

        async function completeDailyTask(taskKey) {
            if (!currentUser) return;
            const tasks = currentUser.daily_tasks || {};
            if (tasks[taskKey]) return;
            tasks[taskKey] = true;
            await supabase.from('users').update({ daily_tasks: tasks }).eq('id', currentUser.id);
            currentUser.daily_tasks = tasks;
            if (taskKey !== 'signed') {
                const bonusGold = 10,
                    bonusExp = 5;
                const newGold = (currentUser.gold || 0) + bonusGold;
                const newExp = (currentUser.exp || 0) + bonusExp;
                await supabase.from('users').update({ gold: newGold, exp: newExp }).eq('id', currentUser.id);
                currentUser.gold = newGold;
                currentUser.exp = newExp;
                toast(`任务完成！+${bonusGold}金币 +${bonusExp}经验`, 'success');
            }
            updateLeftPanel();
        }

        // ================================================================
        // 18. 登出
        // ================================================================
        logoutBtn.addEventListener('click', () => {
            if (chatSubscription) supabase.removeChannel(chatSubscription);
            currentUser = null;
            loginOverlay.classList.remove('hidden');
            appContainer.style.display = 'none';
            loginError.textContent = '';
            loginUsername.value = '';
            loginPassword.value = '';
            loginTabs.forEach(t => t.classList.remove('active'));
            document.querySelector('.login-tab[data-mode="login"]').classList.add('active');
            loginMode = 'login';
            toast('已离开会馆');
        });

        // ================================================================
        // 19. 初始化
        // ================================================================
        function init() {
            loginOverlay.classList.remove('hidden');
            appContainer.style.display = 'none';
        }
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });
        init();

        // 暴露全局
        window.supabase = supabase;
        window.currentUser = currentUser;
        console.log('🌲 雾凇会馆（QQ空间风格）已加载！');
    </script>
</body>
</html>
